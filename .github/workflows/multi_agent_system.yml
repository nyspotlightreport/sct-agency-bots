name: 🧠 Multi-Agent Intelligence System (Daily)
on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID: ${{ secrets.WORDPRESS_SITE_ID }}
  BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
  APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
  HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
  LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
  REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
  REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
  REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
  REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}

jobs:
  orchestrate:
    name: "🎯 Alex Mercer — Morning Brief + Directives"
    runs-on: ubuntu-latest
    outputs:
      directives_ready: ${{ steps.orchestrate.outputs.done }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests feedparser -q
      - name: Run Orchestrator
        id: orchestrate
        run: |
          python agents/alex_mercer_orchestrator.py
          echo "done=true" >> $GITHUB_OUTPUT

  content_agent:
    name: "✍️ Content Intelligence — Write Everything"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/content_intelligence_agent.py

  sales_agent:
    name: "🎯 Sales Intelligence — Personalized Outreach"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/sales_intelligence_agent.py

  inbox_agent:
    name: "📬 Inbox Intelligence — Auto-Reply"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/inbox_intelligence_agent.py

  trend_agent:
    name: "📈 Trend Intelligence — Ride Viral Topics"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests feedparser -q
      - run: python agents/trend_intelligence_agent.py
