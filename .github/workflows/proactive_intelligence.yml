name: 🔍 Proactive Intelligence Engine — Always On

on:
  schedule:
    - cron: '0 5 * * *'    # 5am daily — FIRST workflow to run, before everything else
    - cron: '0 17 * * *'   # 5pm daily — afternoon scan
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type (full/revenue/gaps/roadmap)'
        required: false
        default: 'full'

# This workflow runs BEFORE all others.
# Its job: scan everything, find what's wrong or missing,
# create opportunities, brief the Chairman, auto-act where safe.
# The Chairman should NEVER have to discover something this system can find.

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  NETLIFY_AUTH_TOKEN:   ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID:      ${{ secrets.NETLIFY_SITE_ID }}

jobs:
  proactive-intelligence:
    name: 🔍 Proactive Intelligence Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q

      - name: Run Proactive Intelligence Engine
        run: python agents/proactive_intelligence_agent.py

      - name: Intelligence Summary
        if: always()
        run: |
          echo "## 🔍 Proactive Intelligence Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The intelligence engine has:" >> $GITHUB_STEP_SUMMARY
          echo "- Scanned all 6 domains (agent coverage, revenue, gaps, roadmap, mandates, synergies)" >> $GITHUB_STEP_SUMMARY
          echo "- Created opportunities for every gap found" >> $GITHUB_STEP_SUMMARY
          echo "- Auto-actioned safe improvements" >> $GITHUB_STEP_SUMMARY
          echo "- Built Chairman daily briefing" >> $GITHUB_STEP_SUMMARY
          echo "- Pushed Pushover alert for critical items" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**This workflow runs before all others.**" >> $GITHUB_STEP_SUMMARY
          echo "**The Chairman should never have to discover something this system can find.**" >> $GITHUB_STEP_SUMMARY
