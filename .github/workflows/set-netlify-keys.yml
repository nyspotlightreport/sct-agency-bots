name: Set Netlify Environment Keys
on:
  workflow_dispatch:
jobs:
  set-keys:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - name: Set NEWSAPI_KEY in Netlify
        run: |
          curl -s -X PUT "https://api.netlify.com/api/v1/accounts/69b7d8fe9a840f155a3db797/env/NEWSAPI_KEY" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEWSAPI_KEY\",\"scopes\":[\"functions\",\"runtime\"],\"values\":[{\"id\":\"\",\"context\":\"all\",\"value\":\"$NEWSAPI_KEY\"}]}" \
            && echo "✅ NEWSAPI_KEY set" || echo "❌ NEWSAPI_KEY failed"
          
          curl -s -X PUT "https://api.netlify.com/api/v1/accounts/69b7d8fe9a840f155a3db797/env/ANTHROPIC_API_KEY" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"ANTHROPIC_API_KEY\",\"scopes\":[\"functions\",\"runtime\"],\"values\":[{\"id\":\"\",\"context\":\"all\",\"value\":\"$ANTHROPIC_API_KEY\"}]}" \
            && echo "✅ ANTHROPIC_API_KEY set" || echo "❌ ANTHROPIC_API_KEY failed"

          curl -s -X PUT "https://api.netlify.com/api/v1/accounts/69b7d8fe9a840f155a3db797/env/ALPHA_VANTAGE_API_KEY" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"ALPHA_VANTAGE_API_KEY\",\"scopes\":[\"functions\",\"runtime\"],\"values\":[{\"id\":\"\",\"context\":\"all\",\"value\":\"$ALPHA_VANTAGE_API_KEY\"}]}" \
            && echo "✅ ALPHA_VANTAGE_API_KEY set" || echo "❌ ALPHA_VANTAGE_API_KEY failed"
        env:
          NETLIFY_AUTH_TOKEN:    ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEWSAPI_KEY:           ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      
      - name: Set keys on the specific site too
        run: |
          SITE_ID="8ef722e1-4110-42af-8ddb-ff6c2ce1745e"
          
          for KEY_NAME in NEWSAPI_KEY ANTHROPIC_API_KEY ALPHA_VANTAGE_API_KEY; do
            VALUE="${!KEY_NAME}"
            curl -s -X PUT "https://api.netlify.com/api/v1/sites/$SITE_ID/env/$KEY_NAME" \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$KEY_NAME\",\"scopes\":[\"functions\",\"runtime\",\"builds\"],\"values\":[{\"id\":\"\",\"context\":\"all\",\"value\":\"$VALUE\"}]}" \
            && echo "✅ Site: $KEY_NAME" || echo "❌ Site: $KEY_NAME failed"
          done
        env:
          NETLIFY_AUTH_TOKEN:    ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NEWSAPI_KEY:           ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
