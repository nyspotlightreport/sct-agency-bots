name: Site Health Monitor
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  health:
    name: Check Live Site Health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run health checks
        id: checks
        run: |
          SITE="https://nyspotlightreport.com"
          FAILURES=""
          DETAILS="{}"
          ALL_PASSED=true

          check_url() {
            local name="$1" url="$2" expected_status="$3" expected_body="$4"
            local status body
            if [ -n "$expected_body" ]; then
              body=$(curl -s -o /tmp/resp_body -w "%{http_code}" --max-time 15 "$url")
              status="$body"
              body=$(cat /tmp/resp_body)
            else
              status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url")
              body=""
            fi

            if [ "$status" != "$expected_status" ]; then
              FAILURES="${FAILURES}${name} (expected ${expected_status}, got ${status})\n"
              ALL_PASSED=false
              return 1
            fi

            if [ -n "$expected_body" ] && ! echo "$body" | grep -qi "$expected_body"; then
              FAILURES="${FAILURES}${name} (missing '${expected_body}' in response)\n"
              ALL_PASSED=false
              return 1
            fi
            return 0
          }

          check_url "Homepage" "$SITE/" "200" ""
          check_url "ProFlow" "$SITE/proflow/" "200" ""
          check_url "Checkout Success" "$SITE/checkout/success/" "200" ""
          check_url "Blog" "$SITE/blog/" "200" ""
          check_url "Press" "$SITE/press/" "200" ""
          check_url "Voice AI" "$SITE/.netlify/functions/voice-ai" "200" "ProFlow"
          check_url "Stripe Webhook" "$SITE/.netlify/functions/stripe-webhook" "400" ""

          # POST check for create-checkout
          CHECKOUT_STATUS=$(curl -s -o /tmp/checkout_resp -w "%{http_code}" --max-time 15 \
            -X POST -H "Content-Type: application/json" \
            -d '{"plan":"starter"}' \
            "$SITE/.netlify/functions/create-checkout")
          CHECKOUT_BODY=$(cat /tmp/checkout_resp)
          if [ "$CHECKOUT_STATUS" != "200" ]; then
            FAILURES="${FAILURES}Create Checkout (expected 200, got ${CHECKOUT_STATUS})\n"
            ALL_PASSED=false
          elif ! echo "$CHECKOUT_BODY" | grep -qE "cs_live_|checkout.stripe.com"; then
            FAILURES="${FAILURES}Create Checkout (no session ID in response)\n"
            ALL_PASSED=false
          fi

          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT
          echo "failures<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILURES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Alert on failure
        if: steps.checks.outputs.all_passed == 'false'
        run: |
          curl -s -F "token=${{ secrets.PUSHOVER_API_KEY }}" \
               -F "user=${{ secrets.PUSHOVER_USER_KEY }}" \
               -F "title=🚨 SITE DOWN" \
               -F "message=Health check failures at $(date -u +%H:%M):
          ${{ steps.checks.outputs.failures }}" \
               -F "priority=1" \
               -F "sound=siren" \
               https://api.pushover.net/1/messages.json

      - name: Log to Supabase
        if: always()
        run: |
          PASSED=${{ steps.checks.outputs.all_passed }}
          FAILS='${{ steps.checks.outputs.failures }}'
          curl -s -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/site_health_log" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"all_passed\": $PASSED, \"failures\": [\"${FAILS//\\n/\",\"}\"], \"details\": {}}" || true
