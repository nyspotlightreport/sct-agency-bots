name: Uptime Monitor
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}
      - run: pip install requests
      - name: Restore uptime state
        uses: actions/cache@v4
        with:
          path: uptime_state.json
          key: uptime-state-latest
      - run: python bots/uptime_monitor_bot.py
        env:
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}
          CHAIRMAN_EMAIL:  ${{ secrets.CHAIRMAN_EMAIL }}
          MONITORED_SITES: "https://nyspotlightreport.com,https://nyspotlightreport.com/proflow/,https://nyspotlightreport.com/portal/,https://nyspotlightreport.com/store/"
          PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
