name: 🧬 RSI — Synthetic Organizations Daily Run

on:
  schedule:
    - cron: '0 7 * * *'   # 7am daily — first thing, before all other workflows
    - cron: '0 19 * * *'  # 7pm daily — evening self-improvement cycle
  workflow_dispatch:
    inputs:
      org_id:
        description: 'Specific org to run (or "all")'
        required: false
        default: 'all'
      mode:
        description: 'Mode: run | improve | inspect'
        required: false
        default: 'run'

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:    ${{ secrets.WORDPRESS_SITE_ID }}
  NETLIFY_AUTH_TOKEN:   ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID:      ${{ secrets.NETLIFY_SITE_ID }}

jobs:
  # ── TIER 1: CITWO + QC run first (system health + quality gate) ──
  tier1-citwo:
    name: 🔬 CITWO Corp — Rob Vance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org citwo_corp

  tier1-qc:
    name: ✅ Quality Control Corp — Hayden Cross
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org qc_corp

  # ── TIER 2: Command layer (CEO + Strategy run after CITWO clears) ──
  tier2-ceo:
    name: 🏛️ Executive Command Corp — Alex Mercer
    runs-on: ubuntu-latest
    needs: [tier1-citwo, tier1-qc]
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org ceo_corp

  tier2-strategy:
    name: 📊 Strategy & ROI Corp — Nina Caldwell
    runs-on: ubuntu-latest
    needs: [tier1-citwo]
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org strategy_corp

  # ── TIER 3: Revenue orgs (parallel, after strategy signals) ──
  tier3-sales:
    name: 💰 Sales Command Corp — Sloane Pierce
    runs-on: ubuntu-latest
    needs: [tier2-strategy]
    if: always()
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org sales_corp

  tier3-marketing:
    name: 📢 Marketing & Growth Corp — Elliot Shaw
    runs-on: ubuntu-latest
    needs: [tier2-strategy]
    if: always()
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org marketing_corp

  # ── TIER 4: Infrastructure + Analytics (parallel) ──
  tier4-engineering:
    name: ⚙️ Engineering & Build Corp — Reese Morgan
    runs-on: ubuntu-latest
    needs: [tier1-citwo]
    if: always()
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org engineering_corp

  tier4-analytics:
    name: 📈 Data & Analytics Corp — Drew Sinclair
    runs-on: ubuntu-latest
    needs: [tier2-ceo]
    if: always()
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/rsi_synthetic_orgs.py --org analytics_corp

  # ── FINAL: Summary report ──
  rsi-summary:
    name: 📋 RSI Daily Summary
    runs-on: ubuntu-latest
    needs: [tier3-sales, tier3-marketing, tier4-engineering, tier4-analytics, tier2-ceo]
    if: always()
    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      PUSHOVER_API_KEY:  ${{ secrets.PUSHOVER_API_KEY }}
      PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Generate RSI Summary
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime

          SUPA = os.environ.get("SUPABASE_URL","")
          KEY  = os.environ.get("SUPABASE_KEY") or os.environ.get("SUPABASE_ANON_KEY","")

          if SUPA and KEY:
              req = urllib.request.Request(
                  f"{SUPA}/rest/v1/synthetic_orgs?select=name,fitness_score,total_runs,total_improvements,last_run_at&order=fitness_score.desc",
                  headers={"apikey":KEY,"Authorization":f"Bearer {KEY}"})
              with urllib.request.urlopen(req,timeout=15) as r:
                  orgs = json.loads(r.read())
              
              print("=== RSI SYNTHETIC ORGANIZATIONS DAILY REPORT ===")
              print(f"Date: {datetime.date.today()}")
              print(f"Total Orgs: {len(orgs)}")
              avg_fitness = sum(float(o.get('fitness_score',0) or 0) for o in orgs) / max(len(orgs),1)
              print(f"Avg Fitness: {avg_fitness:.1f}/100")
              print("")
              for o in orgs:
                  fitness = float(o.get('fitness_score',0) or 0)
                  icon = '✅' if fitness >= 70 else ('⚠️' if fitness >= 40 else '❌')
                  print(f"  {icon} {o['name'][:30]}: {fitness:.0f}/100 | runs={o.get('total_runs',0)} | improvements={o.get('total_improvements',0)}")
          PYEOF
      - name: RSI Report to Step Summary
        run: |
          echo "## 🧬 RSI Synthetic Organizations Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| CITWO Corp | ${{ needs.tier1-citwo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| QC Corp | ${{ needs.tier1-qc.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CEO Corp | ${{ needs.tier2-ceo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy Corp | ${{ needs.tier2-strategy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sales Corp | ${{ needs.tier3-sales.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Marketing Corp | ${{ needs.tier3-marketing.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Engineering Corp | ${{ needs.tier4-engineering.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics Corp | ${{ needs.tier4-analytics.result }} |" >> $GITHUB_STEP_SUMMARY
