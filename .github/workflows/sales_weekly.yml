name: 💰 Sales — Weekly Revenue Intelligence
on:
  schedule:
    - cron: "0 9 * * 1"   # Monday 9am
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}

jobs:
  win-loss:
    name: "📊 Win/Loss Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/win_loss_analyzer_bot.py

  upsell:
    name: "💎 Upsell Identification"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/upsell_engine_bot.py

  referrals:
    name: "🤝 Referral Engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/referral_engine_bot.py

  appointments:
    name: "📅 Appointment Setter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/appointment_setter_bot.py
