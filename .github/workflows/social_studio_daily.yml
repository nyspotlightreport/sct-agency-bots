name: 🎬 Social Media Studio (Daily)
on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
  LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
  TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
  INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
  FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
  FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
  BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
  REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
  REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
  REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
  REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

jobs:
  # Step 1: Generate all content for today
  content-production:
    name: "✍️ Content Production Engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Generate platform-native content for all channels
        continue-on-error: true
        run: python agents/content_production_engine.py

  # Step 2: Post to all connected platforms
  social-posting:
    name: "📱 Post to All Platforms"
    needs: content-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Post platform-native content
        continue-on-error: true
        run: python agents/social_media_master_agent.py
      - name: Pinterest with board auto-create
        continue-on-error: true
        run: python bots/pinterest_poster_bot.py
      - name: Medium weekly syndication
        continue-on-error: true
        run: python bots/medium_syndication_bot.py
      - name: Reddit community posts
        continue-on-error: true
        run: python bots/reddit_traffic_machine.py

  # Step 3: YouTube Shorts voice + publish
  youtube:
    name: "🎬 YouTube Shorts"
    needs: content-production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Generate Short scripts
        continue-on-error: true
        run: python bots/youtube_shorts_tiktok_bot.py
      - name: Voice all scripts (ElevenLabs)
        continue-on-error: true
        run: python agents/elevenlabs_voice_pipeline.py

  # Step 4: Engagement — reply to comments
  engagement:
    name: "💬 Engagement Agent"
    needs: social-posting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Reply to comments and DMs
        continue-on-error: true
        run: python agents/engagement_agent.py

# Weekly: Growth analysis + strategy optimization
  growth-analysis:
    name: "📊 Growth Intelligence"
    if: github.event_name == 'schedule' && contains(fromJSON('["Monday"]'), format('{0}', github.run_number))
    needs: engagement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Analyze performance + update strategy
        continue-on-error: true
        run: python agents/growth_intelligence_agent.py
