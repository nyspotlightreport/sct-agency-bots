name: "🔧 Set Netlify Environment Variables"

on:
  workflow_dispatch:

# SECURITY: All credential values come from GitHub Secrets only.
# Nothing hardcoded in this file.

jobs:
  set-netlify-env:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set all OAuth credentials as Netlify env vars
        env:
          NETLIFY_AUTH_TOKEN:        ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:           8ef722e1-4110-42af-8ddb-ff6c2ce1745e
          LINKEDIN_CLIENT_ID:        ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET:    ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          META_APP_ID:               ${{ secrets.META_APP_ID }}
          META_APP_SECRET:           ${{ secrets.META_APP_SECRET }}
          FB_APP_ID:                 ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:             ${{ secrets.FB_APP_SECRET }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:              ${{ secrets.SUPABASE_KEY }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}
          HUBSPOT_API_KEY:           ${{ secrets.HUBSPOT_API_KEY }}
          PUSHOVER_API_KEY:          ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY:         ${{ secrets.PUSHOVER_USER_KEY }}
          GH_PAT:                    ${{ secrets.GH_PAT }}
          STRIPE_SECRET_KEY:         ${{ secrets.STRIPE_SECRET_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - << 'SCRIPT'
          import os, json, urllib.request, urllib.error

          TOKEN   = os.environ.get('NETLIFY_AUTH_TOKEN','')
          SITE_ID = os.environ.get('NETLIFY_SITE_ID','')

          if not TOKEN:
            print("ERROR: NETLIFY_AUTH_TOKEN not set"); exit(1)

          # Only vars that are set (non-empty) get pushed to Netlify
          VARS = {k: v for k, v in {
            'LINKEDIN_CLIENT_ID':     os.environ.get('LINKEDIN_CLIENT_ID',''),
            'LINKEDIN_CLIENT_SECRET': os.environ.get('LINKEDIN_CLIENT_SECRET',''),
            'META_APP_ID':            os.environ.get('META_APP_ID',''),
            'META_APP_SECRET':        os.environ.get('META_APP_SECRET',''),
            'FB_APP_ID':              os.environ.get('FB_APP_ID',''),
            'FB_APP_SECRET':          os.environ.get('FB_APP_SECRET',''),
            'SUPABASE_URL':           os.environ.get('SUPABASE_URL',''),
            'SUPABASE_KEY':           os.environ.get('SUPABASE_KEY',''),
            'SUPABASE_ANON_KEY':      os.environ.get('SUPABASE_ANON_KEY',''),
            'HUBSPOT_API_KEY':        os.environ.get('HUBSPOT_API_KEY',''),
            'PUSHOVER_API_KEY':       os.environ.get('PUSHOVER_API_KEY',''),
            'PUSHOVER_USER_KEY':      os.environ.get('PUSHOVER_USER_KEY',''),
            'GH_PAT':                 os.environ.get('GH_PAT',''),
            'STRIPE_SECRET_KEY':      os.environ.get('STRIPE_SECRET_KEY',''),
            'ANTHROPIC_API_KEY':      os.environ.get('ANTHROPIC_API_KEY',''),
          }.items() if v}

          HEADERS = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}
          ok = 0
          for key, val in VARS.items():
            body = json.dumps([{"key": key, "scopes": ["functions","builds"], "values": [{"context": "production", "value": val}]}]).encode()
            req = urllib.request.Request(f'https://api.netlify.com/api/v1/sites/{SITE_ID}/env', data=body, method='POST', headers=HEADERS)
            try:
              with urllib.request.urlopen(req, timeout=15) as r:
                print(f"  SET: {key}"); ok += 1
            except urllib.error.HTTPError as e:
              if e.code == 422:
                body2 = json.dumps({"scopes": ["functions","builds"], "values": [{"context": "production", "value": val}]}).encode()
                req2 = urllib.request.Request(f'https://api.netlify.com/api/v1/sites/{SITE_ID}/env/{key}', data=body2, method='PUT', headers=HEADERS)
                try:
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                    print(f"  UPDATE: {key}"); ok += 1
                except Exception as e2: print(f"  ERR update {key}: {e2}")
              else: print(f"  ERR {key}: {e.code}")
          print(f"\nDone: {ok}/{len(VARS)} vars set")
          SCRIPT

      - name: Redeploy Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          curl -s -X POST "https://api.netlify.com/api/v1/sites/8ef722e1-4110-42af-8ddb-ff6c2ce1745e/deploys" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" -d '{}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('id','?'))"
