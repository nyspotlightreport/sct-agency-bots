name: 🏗️ Build Feature — On Demand
on:
  workflow_dispatch:
    inputs:
      feature_request:
        description: "Describe the feature to build in plain English"
        required: true
      output_type:
        description: "What to build: bot, agent, or api"
        default: "bot"

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT:            ${{ secrets.GH_PAT }}
  GITHUB_REPOSITORY: "nyspotlightreport/sct-agency-bots"
  ARCHITECT_REQUIREMENT: ${{ github.event.inputs.feature_request }}
  ARCHITECT_TYPE:        ${{ github.event.inputs.output_type }}
  PUSHOVER_API_KEY:      ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:     ${{ secrets.PUSHOVER_USER_KEY }}

jobs:
  architect:
    name: "🏗️ Code Architect — Build Feature"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: "Build feature from requirement"
        run: python agents/code_architect_agent.py
      - name: "Deploy to Netlify if API was built"
        run: echo "Auto-deploy triggered by Deploy workflow"
