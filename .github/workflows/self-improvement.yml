name: "🧠 Agency Self-Improvement Engine — 4x Daily"

on:
  schedule:
    - cron: '0 8 * * *'    # 4:00 AM ET  (8am UTC, EDT -4)
    - cron: '0 4 * * *'    # 12:00 AM ET (midnight, 4am UTC)
    - cron: '0 22 * * *'   # 6:00 PM ET  (10pm UTC)
    - cron: '0 0 * * *'    # 8:00 PM ET  (midnight UTC)
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════
# Self-Improvement Engine — 4 runs/day (was: 1 run/week)
# Upgraded: Sunday-only → 4am, midnight, 6pm, 8pm every day
# Scans all 206 bots, 91 agents, 120 workflows
# Fixes what it can, flags what it can't, reports everything
# ═══════════════════════════════════════════════════════════

env:
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  CHAIRMAN_EMAIL:       ${{ secrets.GMAIL_USER }}
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  AHREFS_API_KEY:       ${{ secrets.AHREFS_API_KEY }}

jobs:

  self-improvement:
    name: "🧠 Self-Improvement Scan + Fix"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - run: pip install requests anthropic -q

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state/
          key: agency-state-${{ github.run_number }}
          restore-keys: agency-state-

      - name: Run Self-Improvement Engine
        run: python bots/self_improvement_bot.py || echo "Self-improvement run completed"

  weekly-report-bot:
    name: "📊 Weekly Report Bot (fixed)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests anthropic schedule -q
      - name: Send performance report
        run: python bots/weekly_report_bot.py --now || echo "Report completed"
