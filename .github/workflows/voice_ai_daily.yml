name: Voice AI - Daily Operations
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
  TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
  TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
  TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
jobs:
  voice-ai:
    name: ProFlow Voice AI Operations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          PYTHONPATH=. python -c "
          import sys; sys.path.insert(0,'.');
          from agents.voice_ai.director import run;
          result = run();
          print('Voice AI check:', result)
          "
