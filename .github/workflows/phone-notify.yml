name: 📱 Phone Notification System

on:
  workflow_call:
    inputs:
      title:
        required: true
        type: string
      message:
        required: true
        type: string
      priority:
        required: false
        type: string
        default: "default"
      tags:
        required: false
        type: string
        default: "robot"
  workflow_dispatch:
    inputs:
      title:
        description: 'Notification title'
        required: true
        default: 'NYSR Bot Update'
      message:
        description: 'Notification message'
        required: true
        default: 'Action required'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 📱 Send push notification
        run: |
          curl -s \
            -H "Title: ${{ inputs.title }}" \
            -H "Tags: ${{ inputs.tags }}" \
            -H "Priority: ${{ inputs.priority }}" \
            -d "${{ inputs.message }}" \
            "https://ntfy.sh/nysr-chairman-sct"
          echo "✅ Phone notification sent"
