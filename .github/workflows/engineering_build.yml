name: 🔧 Engineering — Build Product on Demand
on:
  workflow_dispatch:
    inputs:
      product_type:
        description: 'Product type (chrome_extension|desktop_app|saas|api|cli|mobile|plugin)'
        required: true
        default: 'chrome_extension'
      product_name:
        description: 'Product name'
        required: true
        default: 'My Product'
      specifications:
        description: 'Full product specifications'
        required: true
        default: 'Build a simple utility tool'
      target_audience:
        description: 'Target audience'
        required: false
        default: 'entrepreneurs'
      integrations:
        description: 'Required integrations (comma-separated)'
        required: false
        default: ''

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  ENGINEERING_TASK: ${{ github.event.inputs.specifications }}
  PRODUCT_TYPE: ${{ github.event.inputs.product_type }}
  PRODUCT_NAME: ${{ github.event.inputs.product_name }}

jobs:
  build-product:
    name: "🔧 Reese Morgan — Build ${{ github.event.inputs.product_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Generate complete product codebase
        run: python agents/reese_morgan_engineer.py
      - name: Package and upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.product_name }}
          path: products/
          retention-days: 30
