name: 📚 KDP Book Factory (Weekly)

on:
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  generate-books:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install fpdf2 requests
      - name: 📚 Generate KDP Books
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bots/kdp_book_factory.py
      - name: Commit book files
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/kdp_books/ || true
          git diff --staged --quiet || git commit -m "📚 KDP books generated $(date +%Y-%m-%d)" && git push || true
