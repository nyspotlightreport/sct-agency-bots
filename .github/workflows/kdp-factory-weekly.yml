name: 📚 KDP Book Factory (Weekly)

on:
  schedule:
    - cron: '0 6 * * 3'   # Wednesday 6 AM UTC (alongside existing KDP pipeline)
  workflow_dispatch:

jobs:
  generate-books:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install anthropic fpdf2
      - name: 📚 Generate KDP Books
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bots/kdp_book_factory.py
      - name: Commit book files
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/kdp_books/ || true
          git diff --staged --quiet || git commit -m "📚 KDP books generated $(date +%Y-%m-%d)"
          git push || true
