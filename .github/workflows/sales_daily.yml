name: 💰 Sales — Daily Operations
on:
  schedule:
    - cron: "0 8 * * *"   # 8am daily
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode (full|outreach|followup|proposals)"
        default: "full"

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}

jobs:
  sales-command:
    name: "🎯 Sales Commander Briefing"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/sales_commander_agent.py

  cold-outreach:
    name: "📧 Cold Outreach Sequences"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/cold_outreach_agent.py

  follow-ups:
    name: "🔁 Follow-Up Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/follow_up_bot.py

  proposals:
    name: "📄 Proposal Generator"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/proposal_agent.py

  ab-testing:
    name: "🧪 A/B Test Engine"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/sales_ab_test_bot.py
