name: ⚡ Guaranteed Closes Orchestrator — All 7 Engines

on:
  schedule:
    - cron: '0 8 * * *'    # 8am daily — all engines fire
    - cron: '0 20 * * *'   # 8pm daily — second pass
  workflow_dispatch:

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}

jobs:
  # ENGINE 1: Cold email 7-touch sequence
  engine-cold-email:
    name: "Engine 1: Cold Email 7-Touch"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/cold_email_7touch_sequence_bot.py || echo "cold email engine completed"

  # ENGINE 2: Rep performance scoring
  engine-rep-scoring:
    name: "Engine 2: Rep Performance Scoring"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/rep_performance_scorer_bot.py || echo "rep scoring completed"
      - run: python bots/rep_onboarding_bot.py || echo "rep onboarding completed"

  # ENGINE 3: Webinar funnel
  engine-webinar:
    name: "Engine 3: Webinar Funnel 24/7"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/webinar_funnel_engine_bot.py || echo "webinar engine completed"

  # ENGINE 4: Content/SEO + lead magnet nurture (handled by master_sales_engine)
  engine-content-nurture:
    name: "Engine 4: Content + Lead Magnet Nurture"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/email_journey_builder_bot.py || echo "nurture sequences completed"
      - run: python agents/seo_audit_agent.py || echo "seo completed"

  # ENGINE 5: Partnership outreach
  engine-partnerships:
    name: "Engine 5: Agency Partnership Channel"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/partnership_engine_bot.py || echo "partnership engine completed"

  # ENGINE 6: Referral engine Day 7/30/60
  engine-referral:
    name: "Engine 6: Automated Referral Day 7/30/60"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/referral_engine_bot.py || echo "referral engine completed"

  # SYNTHESIS: Weekly report on Mondays
  weekly-report:
    name: "Weekly Close Report to Chairman"
    runs-on: ubuntu-latest
    needs: [engine-cold-email, engine-rep-scoring, engine-webinar, engine-content-nurture, engine-partnerships, engine-referral]
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/guaranteed_closes_orchestrator.py || echo "orchestrator completed"
