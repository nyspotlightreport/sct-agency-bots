name: 📝 Affiliate Content Publisher (Daily)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  publish-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install anthropic requests

      - name: 📝 Generate and publish affiliate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bots/affiliate_content_bot.py

      - name: Commit new article
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add site/ || true
          git diff --staged --quiet || git commit -m "📝 Affiliate article $(date +%Y-%m-%d)" && git push || true
