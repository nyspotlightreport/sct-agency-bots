name: Secret Pipe — Copy to Live Repo + Create Supabase Tables
on: workflow_dispatch
permissions:
  contents: read
  actions: write
jobs:
  pipe:
    runs-on: ubuntu-latest
    steps:
      - name: Set secrets in live repo using gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
          PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Try using GH_PAT to set secrets on the live repo
          echo "$TARGET_GH_PAT" | gh auth login --with-token 2>/dev/null || true

          for SECRET_NAME in PUSHOVER_API_KEY PUSHOVER_USER_KEY SUPABASE_KEY SUPABASE_SERVICE_KEY; do
            VALUE="${!SECRET_NAME}"
            if [ -z "$VALUE" ]; then
              echo "SKIP: $SECRET_NAME is empty"
              continue
            fi
            echo "$VALUE" | gh secret set "$SECRET_NAME" -R nyspotlightreport/NY-Spotlight-Report-good 2>&1
            echo "$SECRET_NAME -> exit code $?"
          done

          # Verify
          gh secret list -R nyspotlightreport/NY-Spotlight-Report-good 2>&1 | head -20

      - name: Create Supabase tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Try multiple approaches to create tables

          echo "=== Approach 1: Supabase SQL API ==="
          curl -sS -X POST "${SUPABASE_URL}/rest/v1/rpc/exec_sql" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"sql":"CREATE TABLE IF NOT EXISTS site_health_log(id SERIAL PRIMARY KEY,checked_at TIMESTAMPTZ DEFAULT NOW(),all_passed BOOLEAN,failures TEXT[],details JSONB)"}' 2>&1 || true

          curl -sS -X POST "${SUPABASE_URL}/rest/v1/rpc/exec_sql" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"sql":"CREATE TABLE IF NOT EXISTS outreach_log(id SERIAL PRIMARY KEY,recipient_email TEXT,subject TEXT,status TEXT DEFAULT sent,sent_at TIMESTAMPTZ DEFAULT NOW(),template TEXT,prospect_name TEXT)"}' 2>&1 || true

          curl -sS -X POST "${SUPABASE_URL}/rest/v1/rpc/exec_sql" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"sql":"CREATE TABLE IF NOT EXISTS password_reset_tokens(id SERIAL PRIMARY KEY,email TEXT NOT NULL,code TEXT NOT NULL,expires_at TIMESTAMPTZ NOT NULL,used BOOLEAN DEFAULT FALSE,created_at TIMESTAMPTZ DEFAULT NOW())"}' 2>&1 || true

          echo ""
          echo "=== Approach 2: Supabase Management API ==="
          # Get the project ref from the URL
          PROJECT_REF=$(echo "$SUPABASE_URL" | sed 's|https://\(.*\)\.supabase\.co|\1|')
          echo "Project: $PROJECT_REF"

          # Try the management API (requires service role key)
          SQL="CREATE TABLE IF NOT EXISTS site_health_log(id SERIAL PRIMARY KEY,checked_at TIMESTAMPTZ DEFAULT NOW(),all_passed BOOLEAN,failures TEXT[],details JSONB); CREATE TABLE IF NOT EXISTS outreach_log(id SERIAL PRIMARY KEY,recipient_email TEXT,subject TEXT,status TEXT DEFAULT 'sent',sent_at TIMESTAMPTZ DEFAULT NOW(),template TEXT,prospect_name TEXT); CREATE TABLE IF NOT EXISTS password_reset_tokens(id SERIAL PRIMARY KEY,email TEXT NOT NULL,code TEXT NOT NULL,expires_at TIMESTAMPTZ NOT NULL,used BOOLEAN DEFAULT FALSE,created_at TIMESTAMPTZ DEFAULT NOW());"

          curl -sS -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$SQL\"}" 2>&1 || echo "Management API not available"

          echo ""
          echo "=== Verify tables ==="
          for TBL in site_health_log outreach_log password_reset_tokens; do
            HTTP=$(curl -sS -o /dev/null -w "%{http_code}" "${SUPABASE_URL}/rest/v1/${TBL}?limit=1" \
              -H "apikey: ${SUPABASE_SERVICE_KEY}" -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
            echo "$TBL -> HTTP $HTTP"
          done
