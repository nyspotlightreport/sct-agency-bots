name: "🚀 MASTER BOOTSTRAP — Full System Startup"

on:
  workflow_dispatch:

# Runs ALL setup + deploy workflows in the correct order
# Use when setting up from scratch or after credential rotation

env:
  SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:      ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
  PUSHOVER_API_KEY:       ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:      ${{ secrets.PUSHOVER_USER_KEY }}
  HUBSPOT_API_KEY:        ${{ secrets.HUBSPOT_API_KEY }}
  APOLLO_API_KEY:         ${{ secrets.APOLLO_API_KEY }}
  GMAIL_USER:             ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:         ${{ secrets.GMAIL_APP_PASS }}
  GH_PAT:                 ${{ secrets.GITHUB_TOKEN }}
  TICKET_TAILOR_API_KEY:  ${{ secrets.TICKET_TAILOR_API_KEY }}
  STRIPE_SECRET_KEY:      ${{ secrets.STRIPE_SECRET_KEY }}
  AHREFS_API_KEY:         ${{ secrets.AHREFS_API_KEY }}
  NETLIFY_SITE_ID:        ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN:     ${{ secrets.NETLIFY_AUTH_TOKEN }}
  TWOCAPTCHA_LOGIN:       ${{ secrets.TWOCAPTCHA_LOGIN }}
  TWOCAPTCHA_PASSWORD:    ${{ secrets.TWOCAPTCHA_PASSWORD }}

jobs:

  # Step 1: Push all env vars to Netlify
  push-env-vars:
    name: "Step 1 — Push env vars to Netlify"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Push all credentials to Netlify environment
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error

          TOKEN   = os.environ.get('NETLIFY_AUTH_TOKEN','')
          SITE_ID = os.environ.get('NETLIFY_SITE_ID','8ef722e1-4110-42af-8ddb-ff6c2ce1745e')

          if not TOKEN:
            print("WARNING: NETLIFY_AUTH_TOKEN not set — skipping Netlify env push")
            print("ACTION NEEDED: Add NETLIFY_AUTH_TOKEN to GitHub Secrets")
            print("Get it from: app.netlify.com → User Settings → Applications → Personal access tokens")
            exit(0)

          VARS = {k: v for k, v in {
            'SUPABASE_URL':           os.environ.get('SUPABASE_URL',''),
            'SUPABASE_KEY':           os.environ.get('SUPABASE_KEY',''),
            'SUPABASE_ANON_KEY':      os.environ.get('SUPABASE_ANON_KEY',''),
            'ANTHROPIC_API_KEY':      os.environ.get('ANTHROPIC_API_KEY',''),
            'PUSHOVER_API_KEY':       os.environ.get('PUSHOVER_API_KEY',''),
            'PUSHOVER_USER_KEY':      os.environ.get('PUSHOVER_USER_KEY',''),
            'HUBSPOT_API_KEY':        os.environ.get('HUBSPOT_API_KEY',''),
            'APOLLO_API_KEY':         os.environ.get('APOLLO_API_KEY',''),
            'GMAIL_USER':             os.environ.get('GMAIL_USER',''),
            'GMAIL_APP_PASS':         os.environ.get('GMAIL_APP_PASS',''),
            'GH_PAT':                 os.environ.get('GH_PAT',''),
            'STRIPE_SECRET_KEY':      os.environ.get('STRIPE_SECRET_KEY',''),
            'TICKET_TAILOR_API_KEY':  os.environ.get('TICKET_TAILOR_API_KEY',''),
            'TWOCAPTCHA_LOGIN':       os.environ.get('TWOCAPTCHA_LOGIN',''),
            'TWOCAPTCHA_PASSWORD':    os.environ.get('TWOCAPTCHA_PASSWORD',''),
          }.items() if v}

          HEADERS = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}
          ok = 0
          for key, val in VARS.items():
            body = json.dumps([{"key": key, "scopes": ["functions","builds"],
                                "values": [{"context": "production", "value": val}]}]).encode()
            req = urllib.request.Request(
              f'https://api.netlify.com/api/v1/sites/{SITE_ID}/env',
              data=body, method='POST', headers=HEADERS)
            try:
              with urllib.request.urlopen(req, timeout=15) as r:
                print(f"  SET: {key}"); ok += 1
            except urllib.error.HTTPError as e:
              if e.code == 422:  # Already exists, update it
                body2 = json.dumps({"scopes":["functions","builds"],
                  "values":[{"context":"production","value":val}]}).encode()
                req2 = urllib.request.Request(
                  f'https://api.netlify.com/api/v1/sites/{SITE_ID}/env/{key}',
                  data=body2, method='PUT', headers=HEADERS)
                try:
                  with urllib.request.urlopen(req2, timeout=15) as r2:
                    print(f"  UPD: {key}"); ok += 1
                except: print(f"  ERR: {key}")
              else: print(f"  ERR [{e.code}]: {key}")
          print(f"Done: {ok}/{len(VARS)} vars set in Netlify")
          PYEOF

  # Step 2: Deploy site + functions
  deploy:
    name: "Step 2 — Deploy all functions + pages"
    needs: push-env-vars
    uses: ./.github/workflows/deploy-site.yml
    secrets: inherit

  # Step 3: Run self-improvement + all engines
  run-all-engines:
    name: "Step 3 — Fire all revenue engines"
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger all workflows
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, time
          TOKEN = os.environ.get('GH_PAT','')
          if not TOKEN: exit(0)
          H = {'Authorization': f'token {TOKEN}', 'Content-Type': 'application/json',
               'Accept': 'application/vnd.github.v3+json'}
          REPO = 'nyspotlightreport/sct-agency-bots'
          
          req = urllib.request.Request(f'https://api.github.com/repos/{REPO}/actions/workflows?per_page=100', headers=H)
          with urllib.request.urlopen(req, timeout=15) as r:
              wfs = {w['path'].split('/')[-1]: w['id'] for w in json.load(r).get('workflows',[])}
          
          TO_FIRE = [
            'self-improvement.yml',
            'ai_intelligence_layer.yml',
            'priya_email_intelligence.yml',
            'seven_engine_close_system.yml',
            'guardian_self_healing.yml',
            'new_income_bots_daily.yml',
            'ahrefs_content_daily.yml',
          ]
          for wf in TO_FIRE:
              wid = wfs.get(wf)
              if wid:
                  req2 = urllib.request.Request(
                      f'https://api.github.com/repos/{REPO}/actions/workflows/{wid}/dispatches',
                      data=json.dumps({'ref':'main'}).encode(), method='POST', headers=H)
                  try:
                      with urllib.request.urlopen(req2, timeout=15) as r2:
                          print(f'  Triggered: {wf}')
                  except Exception as e: print(f'  Skip: {wf}')
                  time.sleep(0.5)
          PYEOF

  # Step 4: Health check
  health-check:
    name: "Step 4 — System health verification"
    needs: run-all-engines
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Stress test all endpoints
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, time

          BASE = 'https://nyspotlightreport.com'
          ENDPOINTS = [
            ('GET',  '/.netlify/functions/email-dashboard'),
            ('GET',  '/.netlify/functions/ai-dashboard'),
            ('GET',  '/.netlify/functions/knowledge-base'),
            ('GET',  '/store/'),
            ('GET',  '/email/'),
            ('GET',  '/ai/'),
          ]

          results = {'pass':0,'fail':0}
          for method, path in ENDPOINTS:
              url = BASE + path
              try:
                  req = urllib.request.Request(url, method=method)
                  with urllib.request.urlopen(req, timeout=10) as r:
                      print(f'  ✅ [{r.status}] {path}')
                      results['pass'] += 1
              except urllib.error.HTTPError as e:
                  ok = e.code < 500
                  print(f'  {"✅" if ok else "❌"} [{e.code}] {path}')
                  if ok: results['pass'] += 1
                  else: results['fail'] += 1
              except Exception as ex:
                  print(f'  ❌ [ERR] {path} — {ex}')
                  results['fail'] += 1

          print(f'\nHealth check: {results["pass"]} pass / {results["fail"]} fail')
          if results['fail'] > 2: exit(1)  # fail build if >2 endpoints down
          PYEOF
