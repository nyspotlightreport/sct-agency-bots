name: Cross-Repo File Parity Check
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  parity:
    name: Check File Parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: code-repo

      - name: Clone live repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/nyspotlightreport/NY-Spotlight-Report-good.git /tmp/live-repo

      - name: Compare files
        id: compare
        run: |
          MISSING_FILE=$(mktemp)

          # Check HTML files from site/ (use temp file to avoid subshell variable loss)
          if [ -d "code-repo/site" ]; then
            cd code-repo/site
            find . -name "*.html" -type f > /tmp/html_list.txt
            while read f; do
              rel="${f#./}"
              if [ ! -f "/tmp/live-repo/$rel" ]; then
                echo "site/$rel -> $rel" >> "$MISSING_FILE"
              fi
            done < /tmp/html_list.txt
            cd ../..
          fi

          # Check netlify functions
          if [ -d "code-repo/netlify/functions" ]; then
            for f in code-repo/netlify/functions/*.js; do
              fname=$(basename "$f")
              if [ ! -f "/tmp/live-repo/netlify/functions/$fname" ]; then
                echo "netlify/functions/$fname" >> "$MISSING_FILE"
              fi
            done
          fi

          # Also check REVERSE: live-only files not in code repo
          if [ -d "/tmp/live-repo" ]; then
            cd /tmp/live-repo
            find . -name "*.html" -type f -not -path './.git/*' -not -path './.github/*' > /tmp/live_list.txt
            while read f; do
              rel="${f#./}"
              if [ ! -f "$GITHUB_WORKSPACE/code-repo/site/$rel" ]; then
                echo "LIVE-ONLY: $rel (not in code repo)" >> "$MISSING_FILE"
              fi
            done < /tmp/live_list.txt
            cd "$GITHUB_WORKSPACE"
          fi

          MISSING=$(cat "$MISSING_FILE" 2>/dev/null || true)
          rm -f "$MISSING_FILE"

          if [ -n "$MISSING" ]; then
            echo "has_drift=true" >> $GITHUB_OUTPUT
            echo "missing<<EOF" >> $GITHUB_OUTPUT
            echo "$MISSING" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "has_drift=false" >> $GITHUB_OUTPUT
          fi

      - name: Alert on drift
        if: steps.compare.outputs.has_drift == 'true'
        run: |
          curl -s -F "token=${{ secrets.PUSHOVER_API_KEY }}" \
               -F "user=${{ secrets.PUSHOVER_USER_KEY }}" \
               -F "title=⚠️ UNDEPLOYED FILES" \
               -F "message=Files in code repo but NOT live repo:
          ${{ steps.compare.outputs.missing }}" \
               https://api.pushover.net/1/messages.json
