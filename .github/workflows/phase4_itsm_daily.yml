name: Phase 4 — ITSM + Client Portal Daily

on:
  schedule:
    - cron: '0 8 * * *'    # 8am daily
    - cron: '*/30 * * * *' # SLA check every 30 min
  workflow_dispatch:
    inputs:
      component:
        description: 'Component (all/itsm/onboard/sla)'
        required: false
        default: 'all'

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}

jobs:
  itsm-commander:
    name: 🎫 ITSM Commander (SLA + Triage)
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/itsm_commander_agent.py
      - if: always()
        run: echo "✅ ITSM Commander completed $(date)"

  client-onboarding:
    name: 🎉 Client Onboarding + CSAT
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'schedule' || github.event.schedule == '0 8 * * *' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/client_onboarding_bot.py
      - if: always()
        run: echo "✅ Onboarding bot completed $(date)"

  phase4-summary:
    name: 📊 Phase 4 Summary
    runs-on: ubuntu-latest
    needs: [itsm-commander, client-onboarding]
    if: always() && github.event.schedule == '0 8 * * *'
    steps:
      - name: Phase 4 Summary
        run: |
          echo "## 🎫 Phase 4 — ITSM Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ITSM Commander | ${{ needs.itsm-commander.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Client Onboarding | ${{ needs.client-onboarding.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Portal:** https://nyspotlightreport.com/portal/" >> $GITHUB_STEP_SUMMARY
          echo "**Tickets:** https://nyspotlightreport.com/tickets/" >> $GITHUB_STEP_SUMMARY
          echo "**MRR Target:** \$997-1,997/mo per enterprise client" >> $GITHUB_STEP_SUMMARY
