name: 💎 Synergy Engine — Daily Monetization

on:
  schedule:
    - cron: '0 11 * * *'   # 11am daily — after all other workflows
  workflow_dispatch:
    inputs:
      component:
        description: 'Component (all/revenue/proof/wiki/sitemap)'
        required: false
        default: 'all'

env:
  SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:          ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:     ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
  STRIPE_SECRET_KEY:     ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN:  ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  HUBSPOT_API_KEY:       ${{ secrets.HUBSPOT_API_KEY }}
  MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
  LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:     ${{ secrets.WORDPRESS_SITE_ID }}
  TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  NETLIFY_AUTH_TOKEN:    ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID:       ${{ secrets.NETLIFY_SITE_ID }}
  PUSHOVER_API_KEY:      ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:     ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:                ${{ secrets.GH_PAT }}

jobs:
  # All run in parallel for speed
  revenue-unifier:
    name: 💰 Unified Revenue P&L
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'revenue' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/revenue_unifier_bot.py

  social-proof:
    name: ⭐ Social Proof Amplifier
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'proof' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/social_proof_amplifier_bot.py

  wiki-syndication:
    name: 📡 Wiki → Content Syndication
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'wiki' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/wiki_syndication_bot.py

  sitemap-update:
    name: 🗺️ Sitemap + SEO Ping
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'sitemap' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/sitemap_generator_bot.py

  synergy-report:
    name: 📊 Synergy Summary Report
    runs-on: ubuntu-latest
    needs: [revenue-unifier, social-proof, wiki-syndication, sitemap-update]
    if: always()
    steps:
      - name: Synergy Engine Summary
        run: |
          echo "## 💎 Synergy Engine Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Revenue Unifier | ${{ needs.revenue-unifier.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Social Proof | ${{ needs.social-proof.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Wiki Syndication | ${{ needs.wiki-syndication.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap + SEO | ${{ needs.sitemap-update.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Active Synergies:**" >> $GITHUB_STEP_SUMMARY
          echo "- Reviews → Twitter + LinkedIn (auto-amplification)" >> $GITHUB_STEP_SUMMARY
          echo "- Wiki pages → WordPress + LinkedIn articles" >> $GITHUB_STEP_SUMMARY
          echo "- All revenue streams → unified P&L table" >> $GITHUB_STEP_SUMMARY
          echo "- New pages → sitemap → Google/Bing indexed" >> $GITHUB_STEP_SUMMARY
