name: Effectiveness Audit (Daily 6:50am ET)
on:
  schedule:
    - cron: '50 11 * * *'
  workflow_dispatch:
jobs:
  audit:
    name: Effectiveness Audit - 8 Business Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
      PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run Effectiveness Audit
        run: python agents/effectiveness_auditor.py
      - name: Save audit results
        if: always()
        run: |
          git config user.name "Effectiveness Auditor"
          git config user.email "audit@nyspotlightreport.com"
          git add data/audits/ || true
          if ! git diff --cached --quiet; then
            git commit -m "audit: effectiveness $(date +%Y-%m-%d)"
            git push origin main || true
          fi
