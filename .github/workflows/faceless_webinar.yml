name: 🎥 Faceless Webinar — Full Funnel

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours — check for new registrants + follow up
  workflow_dispatch:

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  ELEVENLABS_API_KEY:   ${{ secrets.ELEVENLABS_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}

jobs:
  # Generate voice if not done yet
  generate-voice:
    name: Generate AI Voiceover (ElevenLabs)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/faceless_webinar_voice_bot.py || echo "voice generation attempted"

  # Follow up with all webinar registrants
  webinar-followup:
    name: Follow Up With Registrants — Close The Sale
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Follow up with webinar registrants
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, datetime
          
          SUPA = os.environ.get("SUPABASE_URL","")
          KEY  = os.environ.get("SUPABASE_KEY") or os.environ.get("SUPABASE_ANON_KEY","")
          
          if not SUPA: exit(0)
          
          # Get all webinar registrants not yet converted
          req = urllib.request.Request(
              f"{SUPA}/rest/v1/contacts?source=eq.webinar_registration&stage=neq.CLOSED_WON&select=*",
              headers={"apikey":KEY,"Authorization":f"Bearer {KEY}"})
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  registrants = json.loads(r.read())
              print(f"Webinar registrants to follow up: {len(registrants)}")
              
              for r in registrants:
                  print(f"  Follow up: {r.get('name')} | {r.get('email')} | stage={r.get('stage')}")
                  # Advance their journey
                  data = json.dumps({"stage":"HOT","score":85,
                                     "next_action":"Send webinar follow-up + DFY offer",
                                     "next_action_date":datetime.date.today().isoformat()}).encode()
                  req2 = urllib.request.Request(
                      f"{SUPA}/rest/v1/contacts?id=eq.{r['id']}",
                      data=data, method="PATCH",
                      headers={"apikey":KEY,"Authorization":f"Bearer {KEY}",
                               "Content-Type":"application/json"})
                  urllib.request.urlopen(req2, timeout=10)
          except Exception as e:
              print(f"Follow up check: {e}")
          PYEOF

  # Report to Chairman
  webinar-report:
    name: Webinar Funnel Report
    runs-on: ubuntu-latest
    needs: [webinar-followup]
    if: always()
    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      PUSHOVER_API_KEY:  ${{ secrets.PUSHOVER_API_KEY }}
      PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: |
          python3 << 'PYEOF'
          import os, json, urllib.request
          SUPA = os.environ.get("SUPABASE_URL","")
          KEY  = os.environ.get("SUPABASE_KEY") or os.environ.get("SUPABASE_ANON_KEY","")
          PUSH = os.environ.get("PUSHOVER_API_KEY","")
          USER = os.environ.get("PUSHOVER_USER_KEY","")
          if SUPA and KEY:
              req = urllib.request.Request(
                  f"{SUPA}/rest/v1/contacts?source=eq.webinar_registration&select=stage",
                  headers={"apikey":KEY,"Authorization":f"Bearer {KEY}"})
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      regs = json.loads(r.read())
                  total = len(regs)
                  hot   = len([r for r in regs if r.get("stage") in ["HOT","DEMO","PROPOSAL"]])
                  won   = len([r for r in regs if r.get("stage") == "CLOSED_WON"])
                  if PUSH and USER and total > 0:
                      msg = f"Webinar Funnel\nRegistrants: {total}\nHot leads: {hot}\nClosed: {won}\nPage: nyspotlightreport.com/webinar/"
                      data = json.dumps({"token":PUSH,"user":USER,"title":"Webinar Funnel Update","message":msg}).encode()
                      req2 = urllib.request.Request("https://api.pushover.net/1/messages.json",
                          data=data, headers={"Content-Type":"application/json"})
                      urllib.request.urlopen(req2, timeout=10)
                  print(f"Webinar funnel: {total} registrants | {hot} hot | {won} closed")
              except Exception as e:
                  print(f"Report error: {e}")
          PYEOF
