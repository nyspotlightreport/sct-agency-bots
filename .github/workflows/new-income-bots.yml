name: New Income Bots — Beehiiv, Maps, Shorts, Multi-Platform, Events, KDP

on:
  schedule:
    # Beehiiv Newsletter: Daily 9am ET
    - cron: '0 14 * * *'
    # YouTube Shorts: Daily 6am ET  
    - cron: '0 11 * * *'
    # Multi-Platform: Daily 10am + 4pm ET
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
    # Events Scraper: Daily 5am ET
    - cron: '0 10 * * *'
    # Google Maps Scraper: Weekly Sunday 10am ET
    - cron: '0 15 * * 0'
    # KDP Pipeline: Weekly Wednesday 9am ET
    - cron: '0 14 * * 3'
    # Email Sequences: Daily 8am ET
    - cron: '0 13 * * *'
    # Bandwidth Monitor: Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      bot:
        description: 'Which bot to run'
        required: true
        default: 'beehiiv'
        type: choice
        options:
          - beehiiv
          - maps
          - shorts
          - multiplatform
          - events
          - kdp
          - email_seq
          - bandwidth
          - all

jobs:
  run-new-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests 2>/dev/null || true

      - name: Run Beehiiv Newsletter Bot (9am ET)
        if: github.event.schedule == '0 14 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'beehiiv' || github.event.inputs.bot == 'all'))
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: |
          cd bots && python3 beehiiv_newsletter_bot.py || echo "Beehiiv bot finished"

      - name: Run YouTube Shorts Bot (6am ET)
        if: github.event.schedule == '0 11 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'shorts' || github.event.inputs.bot == 'all'))
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
        run: |
          cd bots && python3 youtube_shorts_bot.py || echo "Shorts bot finished"

      - name: Run Multi-Platform Poster (10am + 4pm ET)
        if: github.event.schedule == '0 15 * * *' || github.event.schedule == '0 21 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'multiplatform' || github.event.inputs.bot == 'all'))
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: |
          cd bots && python3 multiplatform_poster_bot.py || echo "Multiplatform bot finished"

      - name: Run NYC Events Scraper (5am ET)
        if: github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'events' || github.event.inputs.bot == 'all'))
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBLER_API_KEY: ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
        run: |
          cd bots && python3 events_scraper_bot.py || echo "Events bot finished"

      - name: Run Google Maps Lead Scraper (Sunday)
        if: github.event.schedule == '0 15 * * 0' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'maps' || github.event.inputs.bot == 'all'))
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd bots && python3 google_maps_scraper_bot.py || echo "Maps bot finished"

      - name: Run KDP Pipeline (Wednesday)
        if: github.event.schedule == '0 14 * * 3' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'kdp' || github.event.inputs.bot == 'all'))
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAIRMAN_EMAIL: ${{ secrets.CHAIRMAN_EMAIL }}
        run: |
          cd bots && python3 kdp_full_pipeline_bot.py || echo "KDP bot finished"

      - name: Run Email Sequence Bot (8am ET)
        if: github.event.schedule == '0 13 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'email_seq' || github.event.inputs.bot == 'all'))
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          CHAIRMAN_EMAIL: ${{ secrets.CHAIRMAN_EMAIL }}
        run: |
          cd bots && python3 email_sequence_bot.py || echo "Email seq bot finished"

      - name: Run Bandwidth Income Monitor (every 2h)
        if: github.event.schedule == '0 */2 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.bot == 'bandwidth' || github.event.inputs.bot == 'all'))
        env:
          HONEYGAIN_EMAIL: ${{ secrets.HONEYGAIN_EMAIL }}
          HONEYGAIN_PASS: ${{ secrets.HONEYGAIN_PASS }}
          EARNAPP_API_KEY: ${{ secrets.EARNAPP_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          CHAIRMAN_EMAIL: ${{ secrets.CHAIRMAN_EMAIL }}
        run: |
          cd bots && python3 bandwidth_income_bot.py || echo "Bandwidth bot finished"
