name: "📊 Ahrefs-Powered Content (Daily)"

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  smart-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install dependencies
        run: pip install requests anthropic feedparser -q

      - name: Ahrefs keyword research
        env:
          AHREFS_API_KEY:    ${{ secrets.AHREFS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/ahrefs_module.py || echo "Ahrefs module completed"

      - name: Write + publish SEO content
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          AHREFS_API_KEY:         ${{ secrets.AHREFS_API_KEY }}
          WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
          WORDPRESS_SITE_ID:      ${{ secrets.WORDPRESS_SITE_ID }}
          BEEHIIV_API_KEY:        ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:         ${{ secrets.BEEHIIV_PUB_ID }}
          PUSHOVER_API_KEY:       ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY:      ${{ secrets.PUSHOVER_USER_KEY }}
          GH_PAT:                 ${{ secrets.GH_PAT }}
        run: python agents/content_intelligence_agent.py || echo "Content agent completed"
