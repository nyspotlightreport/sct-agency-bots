name: Sync Secrets to DO Server
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/do_key 2>/dev/null || echo "No DO_SSH_KEY"
          chmod 600 ~/.ssh/do_key 2>/dev/null || true
      - name: Sync to server via API
        run: |
          # Use command API to update env vars
          curl -s -X POST http://204.48.29.16:8080/ \
            -H "Content-Type: application/json" \
            -d '{"token":"nysr-general-command-2026-sc-thomas","cmd":"echo ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} >> /opt/nysr/config/.env && sort -u /opt/nysr/config/.env -o /opt/nysr/config/.env && echo ENV_UPDATED"}'
