name: 🔑 Secrets Health Check
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - name: Check All Revenue Keys
        run: |
          echo "=== SECRETS STATUS CHECK ==="
          [ -n "$STRIPE_SECRET_KEY" ] && echo "✅ Stripe" || echo "❌ STRIPE_SECRET_KEY missing"
          [ -n "$YOUTUBE_API_KEY" ] && echo "✅ YouTube API" || echo "❌ YOUTUBE_API_KEY missing"
          [ -n "$YOUTUBE_CHANNEL_ID" ] && echo "✅ YouTube Channel" || echo "❌ YOUTUBE_CHANNEL_ID missing"
          [ -n "$WORDPRESS_ACCESS_TOKEN" ] && echo "✅ WordPress" || echo "❌ WORDPRESS_ACCESS_TOKEN missing"
          [ -n "$GUMROAD_ACCESS_TOKEN" ] && echo "✅ Gumroad" || echo "❌ GUMROAD_ACCESS_TOKEN missing"
          [ -n "$PAYHIP_API_KEY" ] && echo "✅ Payhip" || echo "❌ PAYHIP_API_KEY needed"
          [ -n "$LEMONSQUEEZY_API_KEY" ] && echo "✅ LemonSqueezy" || echo "❌ LEMONSQUEEZY_API_KEY needed"
          [ -n "$TUBEIQ_API_KEY" ] && echo "✅ TubeIQ" || echo "⚠️  TUBEIQ_API_KEY not set (add after AppSumo purchase)"
          [ -n "$KINGSUMO_API_KEY" ] && echo "✅ KingSumo" || echo "⚠️  KINGSUMO_API_KEY not set (add after AppSumo purchase)"
          [ -n "$DO_TOKEN" ] && echo "✅ DigitalOcean" || echo "⚠️  DO_TOKEN needed for VPS"
          [ -n "$BEEHIIV_API_KEY" ] && echo "✅ Beehiiv" || echo "❌ BEEHIIV_API_KEY missing"
          [ -n "$REDBUBBLE_USERNAME" ] && echo "✅ Redbubble" || echo "❌ REDBUBBLE_USERNAME missing"
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          PAYHIP_API_KEY: ${{ secrets.PAYHIP_API_KEY }}
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          TUBEIQ_API_KEY: ${{ secrets.TUBEIQ_API_KEY }}
          KINGSUMO_API_KEY: ${{ secrets.KINGSUMO_API_KEY }}
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          REDBUBBLE_USERNAME: ${{ secrets.REDBUBBLE_USERNAME }}
