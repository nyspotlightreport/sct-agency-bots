name: 🎩 James Butler — Morning Brief (Daily)
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
  CHAIRMAN_EMAIL: ${{ secrets.CHAIRMAN_EMAIL }}

jobs:
  morning-brief:
    name: "🎩 James Butler Morning Brief"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests PyNaCl -q
      - name: Run James Butler
        run: python agents/james_butler_concierge.py
        continue-on-error: true
