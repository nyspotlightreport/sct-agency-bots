name: 🔐 OAuth Token Auto-Refresh

on:
  schedule:
    - cron: '0 */6 * * *'    # Every 6 hours
  workflow_dispatch:

env:
  SUPABASE_URL:           ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:           ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:      ${{ secrets.SUPABASE_ANON_KEY }}
  GH_PAT:                 ${{ secrets.GH_PAT }}
  PUSHOVER_API_KEY:       ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:      ${{ secrets.PUSHOVER_USER_KEY }}
  LINKEDIN_CLIENT_ID:     ${{ secrets.LINKEDIN_CLIENT_ID }}
  LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
  LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}

jobs:
  refresh-tokens:
    name: Auto-Refresh Expiring Tokens
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests PyNaCl -q
      - run: python bots/token_auto_refresh_bot.py || echo "token refresh completed"
