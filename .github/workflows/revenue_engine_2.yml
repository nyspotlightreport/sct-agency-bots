name: 💎 Revenue Engine II — Remaining Revenue Bots

on:
  schedule:
    - cron: '0 10 * * *'   # 10am daily — complements master_revenue_engine
    - cron: '0 22 * * *'   # 10pm cycle
  workflow_dispatch:

env:
  SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:       ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:          ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:         ${{ secrets.HUBSPOT_API_KEY }}
  STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN:    ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  PUSHOVER_API_KEY:        ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:       ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:                  ${{ secrets.GH_PAT }}
  TWITTER_API_KEY:         ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:      ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN:    ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET:   ${{ secrets.TWITTER_ACCESS_SECRET }}
  LINKEDIN_ACCESS_TOKEN:   ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
  LINKEDIN_CLIENT_ID:      ${{ secrets.LINKEDIN_CLIENT_ID }}
  WORDPRESS_ACCESS_TOKEN:  ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:       ${{ secrets.WORDPRESS_SITE_ID }}
  BEEHIIV_API_KEY:         ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID:          ${{ secrets.BEEHIIV_PUB_ID }}
  AHREFS_API_KEY:          ${{ secrets.AHREFS_API_KEY }}
  GMAIL_USER:              ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:          ${{ secrets.GMAIL_APP_PASS }}

jobs:
  # VIRAL GROWTH ENGINE
  referral-engine:
    name: 🔗 Referral Engine — Viral Revenue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/referral_engine_bot.py || echo "referral completed"

  viral-launch:
    name: 🚀 Viral Launch Bot — Product Launches
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/viral_launch_bot.py || echo "viral launch completed"

  # SOCIAL PROOF → CONVERSION
  testimonial-collector:
    name: ⭐ Testimonial Collector — Social Proof
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/testimonial_collector_bot.py || echo "testimonials completed"

  social-proof-engine:
    name: ⭐ Social Proof Engine — Authority Building
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/social_proof_engine_bot.py || echo "social proof completed"

  # UPSELL ENGINE
  upsell-crosssell:
    name: 💰 Upsell/Cross-sell — Expansion Revenue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
