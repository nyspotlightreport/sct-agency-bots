name: 🍋 LemonSqueezy Store Builder (One-Time)
on:
  workflow_dispatch:

jobs:
  build-store:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 🍋 Create LemonSqueezy Store + Products
        env:
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
        run: |
          pip install requests -q
          python bots/lemonsqueezy_store_bot.py
