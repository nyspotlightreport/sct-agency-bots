name: Phase 3 — Shopify Storefront Daily

on:
  schedule:
    - cron: '0 10 * * *'  # 10am daily
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to run (all/sync/orders/abandon/report)'
        required: false
        default: 'all'

env:
  SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:       ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
  SHOPIFY_ACCESS_TOKEN:    ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
  SHOPIFY_STORE_DOMAIN:    ${{ secrets.SHOPIFY_STORE_DOMAIN }}
  GUMROAD_ACCESS_TOKEN:    ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
  PUSHOVER_API_KEY:        ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:       ${{ secrets.PUSHOVER_USER_KEY }}
  HUBSPOT_API_KEY:         ${{ secrets.HUBSPOT_API_KEY }}

jobs:
  product-sync:
    name: Product Sync (Gumroad → Shopify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests --quiet
      - name: Sync Products
        run: python bots/shopify_store_agent.py
      - name: Summary
        if: always()
        run: echo "✅ Storefront sync completed at $(date)"

  shopify-setup:
    name: Shopify Store Setup (one-time)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests shopifyapi --quiet
      - name: Setup Shopify Store
        run: |
          python3 << 'PYEOF'
          import os, json
          import urllib.request

          token = os.environ.get("SHOPIFY_ACCESS_TOKEN", "")
          domain = os.environ.get("SHOPIFY_STORE_DOMAIN", "")
          
          if not token or not domain:
              print("⚠️  SHOPIFY credentials not yet set — store setup pending")
              print("Add SHOPIFY_ACCESS_TOKEN and SHOPIFY_STORE_DOMAIN to GitHub secrets")
              print("Get Shopify store at: https://www.shopify.com/free-trial")
              exit(0)
          
          # Create core collections
          collections = [
              {"title": "AI Automation Tools", "body_html": "Automate your business with AI.", "handle": "ai-automation"},
              {"title": "Done-For-You Services", "body_html": "We build it, you profit.", "handle": "dfy-services"},
              {"title": "Digital Downloads", "body_html": "Instant delivery, lifetime access.", "handle": "digital-downloads"},
          ]
          
          for c in collections:
              url = f"https://{domain}/admin/api/2024-01/custom_collections.json"
              data = json.dumps({"custom_collection": c}).encode()
              req = urllib.request.Request(url, data=data, headers={
                  "X-Shopify-Access-Token": token, "Content-Type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      d = json.loads(r.read())
                      print(f"Created collection: {c['title']}")
              except Exception as e:
                  print(f"Collection {c['title']}: {e}")
          
          print("✅ Shopify store configured")
          PYEOF

  phase3-health:
    name: Phase 3 Health Report
    runs-on: ubuntu-latest
    needs: [product-sync]
    if: always()
    steps:
      - name: Phase 3 Status
        run: |
          echo "=== PHASE 3 STOREFRONT REPORT ==="
          echo "Date: $(date)"
          echo "Product Sync: ${{ needs.product-sync.result }}"
          echo "MRR Target: \$2k-8k/mo (3-8x conversion lift)"
          echo "Store: https://nyspotlightreport.com/store/"
          echo "To activate: Add SHOPIFY_ACCESS_TOKEN + SHOPIFY_STORE_DOMAIN secrets"
