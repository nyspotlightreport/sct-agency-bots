name: 💎 Master Revenue Engine — All Income Streams

on:
  schedule:
    - cron: '0 8 * * *'    # 8am daily — all passive income streams
    - cron: '0 20 * * *'   # 8pm daily — evening revenue cycle
  workflow_dispatch:
    inputs:
      stream:
        description: 'Stream to run (all/passive/active/content/sales)'
        required: false
        default: 'all'

# This workflow activates ALL orphaned high-value bots.
# 131 bots were built but never called. That ends now.
# Every bot that can make money runs on a schedule.

env:
  SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:            ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:       ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:          ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:         ${{ secrets.HUBSPOT_API_KEY }}
  STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN:    ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  PUSHOVER_API_KEY:        ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:       ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:                  ${{ secrets.GH_PAT }}
  AHREFS_API_KEY:          ${{ secrets.AHREFS_API_KEY }}
  GMAIL_USER:              ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:          ${{ secrets.GMAIL_APP_PASS }}
  BEEHIIV_API_KEY:         ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID:          ${{ secrets.BEEHIIV_PUB_ID }}
  TWITTER_API_KEY:         ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:      ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN:    ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET:   ${{ secrets.TWITTER_ACCESS_SECRET }}
  WORDPRESS_ACCESS_TOKEN:  ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:       ${{ secrets.WORDPRESS_SITE_ID }}
  MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
  NETLIFY_AUTH_TOKEN:      ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID:         ${{ secrets.NETLIFY_SITE_ID }}

jobs:
  # ════════════════════════════════════════
  # TIER 1: REVENUE RECOVERY (runs first)
  # Recover money already earned but not captured
  # ════════════════════════════════════════
  billing-recovery:
    name: 💳 Billing Recovery + Failed Payment Rescue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.stream == 'all' || github.event.inputs.stream == 'active' || github.event_name == 'schedule' }}
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/billing_recovery_bot.py || echo "billing recovery completed with warnings"

  churn-prevention:
    name: 🛡️ Churn Prevention — Stop Customer Loss
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.stream == 'all' || github.event.inputs.stream == 'active' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/churn_prevention_bot.py || echo "churn prevention completed"

  # ════════════════════════════════════════
  # TIER 2: PIPELINE ACCELERATION
  # Move deals forward, capture intent signals
  # ════════════════════════════════════════
  deal-pipeline:
    name: 🎯 Deal Pipeline — Auto-Advance All Stages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [billing-recovery]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/deal_pipeline_bot.py || echo "deal pipeline completed"

  intent-signals:
    name: 🔍 Intent Signal Detection — Who's Ready to Buy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/intent_signal_bot.py || echo "intent signal completed"

  lead-scoring:
    name: 🏆 Lead Scoring — Prioritize Best Prospects
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/lead_scoring_bot.py || echo "lead scoring completed"

  job-change-tracker:
    name: 📡 Job Change Tracker — Warm Lead Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/job_change_tracker_bot.py || echo "job change tracker completed"

  client-acquisition:
    name: 🚀 Client Acquisition — Automated B2B Outreach
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/client_acquisition_bot.py || echo "client acquisition completed"

  # ════════════════════════════════════════
  # TIER 3: PASSIVE INCOME STREAMS
  # Money while you sleep
  # ════════════════════════════════════════
  newsletter-engine:
    name: 📧 Newsletter Engine — Beehiiv Revenue
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.stream == 'all' || github.event.inputs.stream == 'passive' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/beehiiv_newsletter_bot.py || echo "newsletter completed"
      - run: python bots/beehiiv_sequence_bot.py || echo "sequence completed"

  affiliate-tracker:
    name: 🔗 Affiliate Tracker — Commission Attribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/affiliate_tracker_bot.py || echo "affiliate tracker completed"

  floor-multiplier:
    name: 📈 Floor Multiplier — Passive Income Optimization
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/floor_multiplier_bot.py || echo "floor multiplier completed"

  amazon-associates:
    name: 🛒 Amazon Associates — Affiliate Revenue
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/amazon_associates_bot.py || echo "amazon associates completed"

  promptbase:
    name: 🤖 Promptbase — AI Prompt Marketplace Sales
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/promptbase_seller_bot.py || echo "promptbase completed"

  # ════════════════════════════════════════
  # TIER 4: CONTENT & SEO
  # Compounding organic growth
  # ════════════════════════════════════════
  campaign-orchestrator:
    name: 🎬 Campaign Orchestrator — Multi-Channel Campaigns
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.inputs.stream == 'all' || github.event.inputs.stream == 'content' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/campaign_orchestrator_bot.py || echo "campaign orchestrator completed"

  medium-syndication:
    name: 📝 Medium Syndication — Authority Content Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/medium_syndication_bot.py || echo "medium syndication completed"

  checkout-optimizer:
    name: 🛒 Checkout Optimizer — Conversion Maximizer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/checkout_optimizer_bot.py || echo "checkout optimizer completed"

  # ════════════════════════════════════════
  # TIER 5: REVENUE INTELLIGENCE
  # ════════════════════════════════════════
  invoice-automation:
    name: 🧾 Invoice Automation — Never Miss a Bill
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/invoice_bot.py || echo "invoice automation completed"

  competitive-alerts:
    name: 🔔 Competitive Alerts — Market Intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/competitive_alert_bot.py || echo "competitive alerts completed"

  funding-alerts:
    name: 💰 Funding Alerts — Hot Prospect Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/funding_alert_bot.py || echo "funding alerts completed"

  free-trial-engine:
    name: 🎁 Free Trial Engine — Conversion Funnel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/free_trial_bot.py || echo "free trial engine completed"

  discount-engine:
    name: 🏷️ Discount Engine — Strategic Pricing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/discount_engine_bot.py || echo "discount engine completed"

  # ════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════
  revenue-summary:
    name: 📊 Master Revenue Summary
    runs-on: ubuntu-latest
    needs: [billing-recovery, churn-prevention, deal-pipeline, newsletter-engine, affiliate-tracker, floor-multiplier, invoice-automation]
    if: always()
    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      PUSHOVER_API_KEY:  ${{ secrets.PUSHOVER_API_KEY }}
      PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
    steps:
      - name: Revenue Engine Summary
        run: |
          echo "## 💎 Master Revenue Engine Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jobs Run:**" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Billing Recovery | ${{ needs.billing-recovery.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Churn Prevention | ${{ needs.churn-prevention.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deal Pipeline | ${{ needs.deal-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Newsletter Engine | ${{ needs.newsletter-engine.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Affiliate Tracker | ${{ needs.affiliate-tracker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Floor Multiplier | ${{ needs.floor-multiplier.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Invoice Automation | ${{ needs.invoice-automation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All orphaned revenue bots now activated and running daily." >> $GITHUB_STEP_SUMMARY
