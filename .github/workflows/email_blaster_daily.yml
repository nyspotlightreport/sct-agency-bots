name: Email Blaster - Daily Outreach
on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
env:
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
jobs:
  blast:
    name: Send Daily Cold Emails
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: PYTHONPATH=. python agents/email_blaster.py
