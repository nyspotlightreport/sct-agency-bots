name: Purchase Watchdog (Every 6hrs)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
env:
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GH_PAT: ${{ secrets.GH_PAT }}
jobs:
  watchdog:
    name: End-to-End Purchase Journey Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python agents/purchase_watchdog.py
