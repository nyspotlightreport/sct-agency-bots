name: 🎨 Redbubble Design Generator (Weekly)

on:
  schedule:
    - cron: '0 5 * * 1'    # Monday 5 AM UTC
  workflow_dispatch:

jobs:
  generate-designs:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests pillow
      - name: 🎨 Generate POD designs
        run: python bots/redbubble_design_bot.py
      - name: Commit designs
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/redbubble_designs/ data/REDBUBBLE_UPLOAD_GUIDE.md || true
          git diff --staged --quiet || git commit -m "🎨 New Redbubble designs $(date +%Y-%m-%d)" && git push || true
