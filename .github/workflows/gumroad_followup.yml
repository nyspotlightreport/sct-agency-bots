name: "Track 5 - Gumroad Buyer Follow-Up"

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

env:
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  check-sales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Gumroad follow-up bot
        run: python agents/gumroad_followup.py

      - name: Commit processed sales tracker
        run: |
          git config user.name "SCT Agency Bot"
          git config user.email "bot@myproflow.org"
          git add data/gumroad/ || true
          git diff --staged --quiet || git commit -m "chore: update processed Gumroad sales $(date +%Y-%m-%d-%H%M)"
          git push || true
