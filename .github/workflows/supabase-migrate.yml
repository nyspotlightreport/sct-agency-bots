name: Supabase Migration
on: workflow_dispatch
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Run SQL migration via Supabase SQL API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.parse

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']

          # Extract project ref from URL (e.g., https://abcdefg.supabase.co -> abcdefg)
          project_ref = url.replace('https://','').split('.')[0]
          print(f"Project ref: {project_ref}")

          # SQL statements to execute one by one
          statements = [
            """CREATE TABLE IF NOT EXISTS voice_conversations (
              id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
              call_sid TEXT NOT NULL,
              from_number TEXT,
              department TEXT,
              turn INTEGER DEFAULT 0,
              caller_text TEXT,
              ai_response TEXT,
              created_at TIMESTAMPTZ DEFAULT NOW()
            )""",
            "CREATE INDEX IF NOT EXISTS idx_voice_conv_call ON voice_conversations(call_sid)",
            """CREATE TABLE IF NOT EXISTS client_users (
              id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
              email TEXT UNIQUE NOT NULL,
              password_hash TEXT NOT NULL,
              name TEXT NOT NULL,
              company TEXT,
              plan TEXT DEFAULT 'starter',
              role TEXT DEFAULT 'client',
              active BOOLEAN DEFAULT true,
              stripe_customer_id TEXT,
              created_at TIMESTAMPTZ DEFAULT NOW(),
              last_login TIMESTAMPTZ
            )""",
            "CREATE INDEX IF NOT EXISTS idx_client_users_email ON client_users(email)",
            """CREATE TABLE IF NOT EXISTS client_content (
              id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
              client_id UUID REFERENCES client_users(id) ON DELETE CASCADE,
              type TEXT,
              title TEXT NOT NULL,
              status TEXT DEFAULT 'draft',
              platform TEXT,
              word_count INTEGER,
              seo_score INTEGER,
              published_at TIMESTAMPTZ,
              created_at TIMESTAMPTZ DEFAULT NOW()
            )""",
            "CREATE INDEX IF NOT EXISTS idx_client_content_client ON client_content(client_id)",
            """CREATE TABLE IF NOT EXISTS client_analytics (
              id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
              client_id UUID REFERENCES client_users(id) ON DELETE CASCADE,
              date DATE NOT NULL,
              page_views INTEGER DEFAULT 0,
              unique_visitors INTEGER DEFAULT 0,
              leads_generated INTEGER DEFAULT 0,
              social_engagement INTEGER DEFAULT 0,
              voice_calls INTEGER DEFAULT 0,
              created_at TIMESTAMPTZ DEFAULT NOW(),
              UNIQUE(client_id, date)
            )""",
            "CREATE INDEX IF NOT EXISTS idx_client_analytics ON client_analytics(client_id, date)",
            """CREATE TABLE IF NOT EXISTS client_social_posts (
              id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
              client_id UUID REFERENCES client_users(id) ON DELETE CASCADE,
              platform TEXT NOT NULL,
              content TEXT,
              status TEXT DEFAULT 'scheduled',
              likes INTEGER DEFAULT 0,
              comments INTEGER DEFAULT 0,
              shares INTEGER DEFAULT 0,
              impressions INTEGER DEFAULT 0,
              published_at TIMESTAMPTZ,
              created_at TIMESTAMPTZ DEFAULT NOW()
            )""",
            "CREATE INDEX IF NOT EXISTS idx_client_social ON client_social_posts(client_id)",
            "ALTER TABLE voice_conversations ENABLE ROW LEVEL SECURITY",
            "ALTER TABLE client_users ENABLE ROW LEVEL SECURITY",
            "ALTER TABLE client_content ENABLE ROW LEVEL SECURITY",
            "ALTER TABLE client_analytics ENABLE ROW LEVEL SECURITY",
            "ALTER TABLE client_social_posts ENABLE ROW LEVEL SECURITY",
          ]

          # Try the Supabase SQL endpoint (available on paid plans)
          sql_url = f"https://{project_ref}.supabase.co/rest/v1/rpc/"

          # Method: Use pg_net or direct REST query approach
          # Actually, let's try the Supabase Management API
          mgmt_url = f"https://api.supabase.com/v1/projects/{project_ref}/database/query"

          for i, stmt in enumerate(statements):
            print(f"\n--- Statement {i+1}/{len(statements)} ---")
            print(stmt[:80] + "...")

            # Try Management API first
            try:
              req = urllib.request.Request(
                mgmt_url,
                data=json.dumps({"query": stmt}).encode(),
                headers={
                  "Authorization": f"Bearer {key}",
                  "Content-Type": "application/json",
                },
                method="POST",
              )
              resp = urllib.request.urlopen(req)
              print(f"  SUCCESS ({resp.status})")
            except urllib.error.HTTPError as e:
              body = e.read().decode()[:200]
              print(f"  Mgmt API failed ({e.code}): {body}")

              # Fallback: try PostgREST RPC
              try:
                rpc_req = urllib.request.Request(
                  f"{url}/rest/v1/rpc/exec_raw_sql",
                  data=json.dumps({"sql": stmt}).encode(),
                  headers={
                    "apikey": key,
                    "Authorization": f"Bearer {key}",
                    "Content-Type": "application/json",
                  },
                  method="POST",
                )
                rpc_resp = urllib.request.urlopen(rpc_req)
                print(f"  RPC SUCCESS ({rpc_resp.status})")
              except Exception as e2:
                print(f"  RPC also failed: {str(e2)[:100]}")

          # Final check: try to access each table
          print("\n=== TABLE STATUS ===")
          tables = ['voice_conversations', 'client_users', 'client_content', 'client_analytics', 'client_social_posts']
          for table in tables:
            try:
              check = urllib.request.Request(
                f"{url}/rest/v1/{table}?limit=0",
                headers={"apikey": key, "Authorization": f"Bearer {key}"}
              )
              urllib.request.urlopen(check)
              print(f"  {table}: ✅ EXISTS")
            except urllib.error.HTTPError as e:
              print(f"  {table}: ❌ {e.code}")
          PYEOF
