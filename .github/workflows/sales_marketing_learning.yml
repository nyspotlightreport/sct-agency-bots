name: 🧠 Sales + Marketing + Learning Engine
on:
  schedule:
    - cron: "0 7 * * *"    # 7am daily — full sales + marketing run
    - cron: "0 19 * * *"   # 7pm daily — learning cycle + self-correction
    - cron: "0 12 * * 1"   # Monday noon — weekly deep learning
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options: [full, sales_only, marketing_only, learning_only]

env:
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
  AHREFS_API_KEY:       ${{ secrets.AHREFS_API_KEY }}
  NTFY_CHANNEL:         ${{ secrets.NTFY_CHANNEL }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ── SALES ENGINE ─────────────────────────────────────────────
  zero-resistance-sales:
    name: "💰 Zero-Resistance Sales (ID→Close)"
    runs-on: ubuntu-latest
    if: github.event.inputs.mode != 'marketing_only' && github.event.inputs.mode != 'learning_only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Pull + score + sequence hot prospects
        run: python agents/zero_resistance_sales_engine.py
        continue-on-error: true
      - name: Adaptive sales intelligence (follow-ups, stalled leads)
        run: python agents/adaptive_sales_engine.py
        continue-on-error: true
      - name: Commit sales data
        run: |
          git config user.name "Sloane Pierce"
          git config user.email "nyspotlightreport@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "sales: daily run $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── MARKETING ENGINE ──────────────────────────────────────────
  marketing-velocity:
    name: "📈 Marketing Velocity (Demand Generation)"
    runs-on: ubuntu-latest
    if: github.event.inputs.mode != 'sales_only' && github.event.inputs.mode != 'learning_only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Generate + execute weekly campaign plan
        run: python agents/marketing_velocity_engine.py
        continue-on-error: true
      - name: Multi-channel content distribution
        run: python agents/content_production_engine.py
        continue-on-error: true
      - name: Social media posting (all platforms)
        run: python agents/social_media_master_agent.py
        continue-on-error: true
      - name: Competitive intelligence
        run: python agents/market_intelligence_scout.py
        continue-on-error: true

  # ── LEARNING ENGINE (RUNS AT 7PM) ─────────────────────────────
  system-learning:
    name: "🧠 System Learning + Self-Correction"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Audit all workflows + detect patterns
        run: python agents/system_learning_brain.py
        continue-on-error: true
      - name: Sales learning cycle (kill losers, amplify winners)
        run: python agents/adaptive_sales_engine.py
        continue-on-error: true
      - name: Content performance analysis
        run: python agents/growth_intelligence_agent.py
        continue-on-error: true
      - name: Commit learnings to knowledge base
        run: |
          git config user.name "Drew Sinclair"
          git config user.email "nyspotlightreport@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "brain: learning cycle $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── WEEKLY DEEP LEARNING (MONDAYS) ────────────────────────────
  weekly-deep-learning:
    name: "📊 Weekly Deep Learning (Mondays)"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 12 * * 1' || github.event.inputs.mode == 'learning_only'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Full agency performance audit
        run: python agents/system_learning_brain.py
        continue-on-error: true
      - name: Full sales learning cycle
        run: python agents/adaptive_sales_engine.py
        continue-on-error: true
      - name: ROI + strategy optimization
        run: python agents/strategic_roi_optimizer.py
        continue-on-error: true
      - name: Update all agent knowledge bases
        run: python agents/deliverable_orchestrator.py
        continue-on-error: true
