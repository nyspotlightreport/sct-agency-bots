name: "📬 Email Intelligence — Priya Sharma (Every 15min)"

on:
  schedule:
    - cron: '0 */6 * * *'   # Reduced from 15min to 6hrs — inbox flood fix   # Every 15 minutes, 24/7
  workflow_dispatch:

# Department: Email Intelligence
# Head: Priya Sharma — Chief Email Intelligence Officer
# Mission: Sean never sees a low-priority email again.
# Priority inbox: nyspotlightreport+priority@gmail.com

env:
  GMAIL_USER:         ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:     ${{ secrets.GMAIL_APP_PASS }}
  PRIORITY_EMAIL:     nyspotlightreport+priority@gmail.com
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}

jobs:
  priya-email-triage:
    name: "Priya Sharma — Email Triage + Action"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Run email intelligence agent
        run: python agents/priya_sharma_email_agent.py || echo "Email triage completed"

  morning-digest:
    name: "Morning Digest — 7am"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Send morning digest (runs every 15min, digest logic handles time gate)
        run: python bots/email_morning_digest_bot.py || echo "Digest completed"
