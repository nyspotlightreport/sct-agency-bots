name: 🔧 System-Wide Critical Fixes — Immediate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # 6am — runs BEFORE everything else alongside health check

# Fixes all 6 critical gaps identified by holistic audit:
# 1. Wiki agent — force generate all 6 pages
# 2. SEO opportunities — force populate from Ahrefs
# 3. Email journeys — force fire for all eligible contacts
# 4. RSI agents — force first run to initialize
# 5. Analytics tracking — push to all pages
# 6. A/B tests — initialize first tests

env:
  SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:   ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
  AHREFS_API_KEY:      ${{ secrets.AHREFS_API_KEY }}
  PUSHOVER_API_KEY:    ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:   ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:              ${{ secrets.GH_PAT }}
  HUBSPOT_API_KEY:     ${{ secrets.HUBSPOT_API_KEY }}
  APOLLO_API_KEY:      ${{ secrets.APOLLO_API_KEY }}
  TWITTER_API_KEY:     ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:  ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:   ${{ secrets.WORDPRESS_SITE_ID }}

jobs:
  fix-wiki:
    name: 📚 FIX — Generate Wiki Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Force generate all wiki pages
        run: |
          python agents/wiki_agent.py
          echo "Wiki agent run complete"

  fix-seo:
    name: 🔍 FIX — Populate SEO Opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/seo_audit_agent.py

  fix-email-journeys:
    name: 📧 FIX — Fire Email Journeys
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/email_journey_builder_bot.py

  fix-rsi-init:
    name: 🧬 FIX — Initialize RSI Synthetic Orgs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Run all RSI orgs to initialize
        run: |
          python agents/rsi_synthetic_orgs.py --org citwo_corp
          python agents/rsi_synthetic_orgs.py --org ceo_corp
          python agents/rsi_synthetic_orgs.py --org sales_corp
          python agents/rsi_synthetic_orgs.py --org engineering_corp

  fix-cro-tests:
    name: 🧪 FIX — Initialize A/B Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/conversion_optimizer_bot.py

  fix-proactive-intel:
    name: 🔍 FIX — Run Proactive Intelligence Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/proactive_intelligence_agent.py

  fixes-summary:
    name: ✅ Critical Fixes Summary
    runs-on: ubuntu-latest
    needs: [fix-wiki, fix-seo, fix-email-journeys, fix-rsi-init, fix-cro-tests, fix-proactive-intel]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🔧 Critical System Fixes" >> $GITHUB_STEP_SUMMARY
          echo "| Fix | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Wiki Pages Generated | ${{ needs.fix-wiki.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO Opportunities Populated | ${{ needs.fix-seo.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Journeys Fired | ${{ needs.fix-email-journeys.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RSI Orgs Initialized | ${{ needs.fix-rsi-init.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| A/B Tests Created | ${{ needs.fix-cro-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Intel Scan Run | ${{ needs.fix-proactive-intel.result }} |" >> $GITHUB_STEP_SUMMARY
