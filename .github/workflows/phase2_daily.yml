name: Phase 2 — Project Management + Wiki Daily

on:
  schedule:
    - cron: '0 9 * * *'   # 9am daily
  workflow_dispatch:
    inputs:
      component:
        description: 'Run specific component (all/pm/wiki)'
        required: false
        default: 'all'

env:
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT:             ${{ secrets.GH_PAT }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}

jobs:
  project-management:
    name: Project Management Agent
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'pm' || github.event_name == 'schedule' }}
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests --quiet
      - name: Run Project Management Agent
        run: python agents/project_management_agent.py
      - name: Summary
        if: always()
        run: echo "✅ Project Management Agent completed at $(date)"

  wiki-agent:
    name: Wiki Agent
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'wiki' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests --quiet
      - name: Run Wiki Agent
        run: python agents/wiki_agent.py
      - name: Summary
        if: always()
        run: echo "✅ Wiki Agent completed at $(date)"

  phase2-health:
    name: Phase 2 Health Report
    runs-on: ubuntu-latest
    needs: [project-management, wiki-agent]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Phase 2 Status
        run: |
          echo "=== PHASE 2 DAILY REPORT ===" 
          echo "Date: $(date)"
          echo "Project Management: ${{ needs.project-management.result }}"
          echo "Wiki Agent: ${{ needs.wiki-agent.result }}"
          echo "MRR Target: \$2k-5k/mo unlock"
          echo "Dashboard: https://nyspotlightreport.com/projects/"
          echo "Wiki: https://nyspotlightreport.com/wiki/"
