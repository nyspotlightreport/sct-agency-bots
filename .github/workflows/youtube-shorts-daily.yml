name: 🎬 YouTube Shorts Generator (Daily)
on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  generate-short:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests -q
      - name: Generate TubeIQ-Optimized Short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          TUBEIQ_API_KEY: ${{ secrets.TUBEIQ_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: python3 bots/youtube_tubeiq_enhanced_bot.py
      - name: Save script artifact
        uses: actions/upload-artifact@v4
        with:
          name: shorts-script-${{ github.run_number }}
          path: data/shorts_script_*.json
          retention-days: 30
