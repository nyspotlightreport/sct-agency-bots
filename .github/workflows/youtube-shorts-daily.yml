name: 🎬 YouTube Shorts Generator (Daily)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Generate Short script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python bots/youtube_shorts_generator.py
      - name: Commit script
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/youtube_shorts/ || true
          git diff --staged --quiet || git commit -m "Add Short script $(date +%Y-%m-%d)" && git push || true
