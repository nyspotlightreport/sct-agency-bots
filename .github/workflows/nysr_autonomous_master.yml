name: 🤖 NYSR Autonomous System (Master)
on:
  schedule:
    - cron: "0 7 * * 1-5"   # Weekdays 7am ET (morning run)
    - cron: "0 19 * * 1-5"  # Weekdays 7pm ET (evening run)
    - cron: "0 12 * * 0,6"  # Weekends noon ET
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
  APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
  GMAIL_USER: ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
  HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
  AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
  MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID: ${{ secrets.WORDPRESS_SITE_ID }}

jobs:
  # ════════════════════════════════════════
  # STEP 1: ORCHESTRATOR — runs first, sets directives
  # ════════════════════════════════════════
  orchestrate:
    name: "🧠 Alex Mercer — Orchestrate"
    runs-on: ubuntu-latest
    outputs:
      directives: ${{ steps.run.outputs.directives }}
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests feedparser -q
      - id: run
        name: Orchestrate today's operations
        continue-on-error: true
        run: python agents/alex_mercer_orchestrator.py

  # ════════════════════════════════════════
  # STEP 2: ALL AGENTS RUN IN PARALLEL
  # ════════════════════════════════════════
  content:
    name: "✍️ Content Intelligence"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests feedparser -q
      - name: Write content suite
        continue-on-error: true
        run: python agents/content_intelligence_agent.py
      - name: Publish blog to Netlify
        continue-on-error: true
        run: python bots/netlify_blog_publisher.py

  sales:
    name: "🎯 Sales Intelligence"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Personalized cold outreach
        continue-on-error: true
        run: python agents/sales_intelligence_agent.py

  inbox:
    name: "📧 Inbox Intelligence"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Process + reply to emails
        continue-on-error: true
        run: python agents/inbox_intelligence_agent.py

  trends:
    name: "📈 Trend Intelligence"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests feedparser -q
      - name: Trend content generation
        continue-on-error: true
        run: python agents/trend_intelligence_agent.py

  market_intel:
    name: "💼 Market Intelligence Scout"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Scan for opportunities
        continue-on-error: true
        run: python agents/market_intelligence_scout.py

  reputation:
    name: "🛡️ Reputation Intelligence"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Monitor brand + threats
        continue-on-error: true
        run: python agents/reputation_intelligence_engine.py

  journalist:
    name: "📰 Journalist Tracker"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Track journalists + pitch
        continue-on-error: true
        run: python bots/journalist_tracker_bot.py
      - name: PR outreach
        continue-on-error: true
        run: python bots/pr_outreach_bot.py

  passive_income:
    name: "💰 Passive Income Bots"
    needs: orchestrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Affiliate + income tracking
        continue-on-error: true
        run: python bots/affiliate_tracker_bot.py
      - name: Multi-platform income bots
        continue-on-error: true
        run: python bots/multi_platform_income_bot.py

  # ════════════════════════════════════════
  # STEP 3: GUARDIAN — runs last, fixes anything broken
  # ════════════════════════════════════════
  guardian:
    name: "🛡️ The Guardian — Self-Heal"
    needs: [content, sales, inbox, trends, market_intel, reputation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Self-heal any failures
        run: python agents/the_guardian.py
      - name: Deploy any site updates
        run: |
          curl -X POST "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/builds"             -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}"             -H "Content-Type: application/json" -d "{}" --silent || true
