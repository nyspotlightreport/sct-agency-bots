name: Set Netlify Environment Variables
on:
  workflow_dispatch:
jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set ELEVENLABS_API_KEY on Netlify
        run: |
          curl -s -X PATCH \
            "https://api.netlify.com/api/v1/accounts/me/env/ELEVENLABS_API_KEY?site_id=${{ secrets.NETLIFY_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"key":"ELEVENLABS_API_KEY","scopes":["functions"],"values":[{"context":"all","value":"${{ secrets.ELEVENLABS_API_KEY }}"}]}' || \
          curl -s -X POST \
            "https://api.netlify.com/api/v1/accounts/me/env?site_id=${{ secrets.NETLIFY_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"ELEVENLABS_API_KEY","scopes":["functions"],"values":[{"context":"all","value":"${{ secrets.ELEVENLABS_API_KEY }}"}]}]'
      - name: Set TWILIO_AUTH_TOKEN on Netlify
        run: |
          curl -s -X PATCH \
            "https://api.netlify.com/api/v1/accounts/me/env/TWILIO_AUTH_TOKEN?site_id=${{ secrets.NETLIFY_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"key":"TWILIO_AUTH_TOKEN","scopes":["functions"],"values":[{"context":"all","value":"${{ secrets.TWILIO_AUTH_TOKEN }}"}]}' || \
          curl -s -X POST \
            "https://api.netlify.com/api/v1/accounts/me/env?site_id=${{ secrets.NETLIFY_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"TWILIO_AUTH_TOKEN","scopes":["functions"],"values":[{"context":"all","value":"${{ secrets.TWILIO_AUTH_TOKEN }}"}]}]'
      - name: Set ELEVENLABS_VOICE_ID on Netlify
        run: |
          curl -s -X POST \
            "https://api.netlify.com/api/v1/accounts/me/env?site_id=${{ secrets.NETLIFY_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '[{"key":"ELEVENLABS_VOICE_ID","scopes":["functions"],"values":[{"context":"all","value":"EXAVITQu4vr4xnSDxMaL"}]}]' || true
      - name: Verify env vars
        run: |
          echo "Listing Netlify env vars for site..."
          curl -s "https://api.netlify.com/api/v1/accounts/me/env?site_id=${{ secrets.NETLIFY_SITE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" | python3 -c "import sys,json; [print(e['key']) for e in json.load(sys.stdin)]"
