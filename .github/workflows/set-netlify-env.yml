name: Sync ALL Secrets to Netlify
on:
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g netlify-cli
      - name: Sync
        run: |
          S="8ef722e1-4110-42af-8ddb-ff6c2ce1745e"
          sv() { [ -n "$2" ] && netlify env:set "$1" "$2" --site "$S" 2>&1|tail -1 && echo "SET $1" || echo "SKIP $1"; }
          sv STRIPE_SECRET_KEY "$V1"; sv GMAIL_APP_PASS "$V2"; sv SMTP_USER "$V3"
          sv SUPABASE_URL "$V4"; sv SUPABASE_KEY "$V5"
          sv PUSHOVER_API_KEY "$V6"; sv PUSHOVER_USER_KEY "$V7"; sv GH_PAT "$V8"
          sv HUBSPOT_API_KEY "$V9"; sv ANTHROPIC_API_KEY "$V10"; sv OPENAI_API_KEY "$V11"
          sv GMAIL_USER "$V12"; sv TICKET_TAILOR_API_KEY "$V13"
          sv HUBSPOT_PORTAL_ID "$V14"; sv STRIPE_ACCOUNT_ID "$V15"
          echo "Redeploying..."
          netlify deploy --prod --dir site --site "$S" --message "Secret sync" 2>&1|tail -3
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          V1: ${{ secrets.STRIPE_SECRET_KEY }}
          V2: ${{ secrets.GMAIL_APP_PASS }}
          V3: ${{ secrets.SMTP_USER }}
          V4: ${{ secrets.SUPABASE_URL }}
          V5: ${{ secrets.SUPABASE_KEY }}
          V6: ${{ secrets.PUSHOVER_API_KEY }}
          V7: ${{ secrets.PUSHOVER_USER_KEY }}
          V8: ${{ secrets.GH_PAT }}
          V9: ${{ secrets.HUBSPOT_API_KEY }}
          V10: ${{ secrets.ANTHROPIC_API_KEY }}
          V11: ${{ secrets.OPENAI_API_KEY }}
          V12: ${{ secrets.GMAIL_USER }}
          V13: ${{ secrets.TICKET_TAILOR_API_KEY }}
          V14: ${{ secrets.HUBSPOT_PORTAL_ID }}
          V15: ${{ secrets.STRIPE_ACCOUNT_ID }}
