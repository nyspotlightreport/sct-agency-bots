name: 🔥 Sales & Marketing Engine (Daily)
on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:
env:
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
  NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
  AHREFS_API_KEY:       ${{ secrets.AHREFS_API_KEY }}
  GH_PAT:               ${{ secrets.GITHUB_TOKEN }}
  GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
  NTFY_CHANNEL:         ${{ secrets.NTFY_CHANNEL }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  LINKEDIN_CLIENT_ID:   ${{ secrets.LINKEDIN_CLIENT_ID }}
  LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}

jobs:

  sales-intelligence:
    name: "🧠 Sales Intelligence + Lead Scoring"
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests PyNaCl -q
      - name: Run adaptive sales engine (learning cycle on Mondays)
        run: python agents/adaptive_sales_engine.py
        continue-on-error: true
      - name: Commit sales data
        run: |
          git config user.name "James Butler"
          git config user.email "nyspotlightreport@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "sales: intelligence run $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  outreach-coordinator:
    name: "📡 Multi-Channel Outreach Coordinator"
    needs: sales-intelligence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Fetch prospects + stage sequences + execute due touches
        run: python agents/multi_channel_coordinator.py
        continue-on-error: true
      - name: Commit sequence data
        run: |
          git config user.name "Sloane Pierce"
          git config user.email "nyspotlightreport@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "sales: sequences updated $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conversion-closer:
    name: "💰 Conversion Closer (Reply Handler)"
    needs: outreach-coordinator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests imaplib2 -q || pip install requests -q
      - name: Check inbox + classify replies + send responses
        run: python agents/conversion_closer.py
        continue-on-error: true

  marketing-intelligence:
    name: "📊 Marketing Intelligence + A/B Engine"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Marketing analysis + viral opportunities + funnel
        run: python agents/marketing_intelligence_engine.py
        continue-on-error: true

  system-brain:
    name: "🧬 System Learning Brain (Weekly on Monday)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: All-department health scan + fixes + agent evolution
        run: python agents/system_learning_brain.py
        continue-on-error: true
      - name: Commit brain outputs
        run: |
          git config user.name "System Brain"
          git config user.email "nyspotlightreport@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "brain: learning cycle $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
