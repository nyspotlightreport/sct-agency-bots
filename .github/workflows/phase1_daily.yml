name: 🚀 Phase 1 — Daily Customer Acquisition
on:
  schedule:
    - cron: "0 7 * * *"   # 7am — before business hours, so outreach is ready by 9am
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  AHREFS_API_KEY:     ${{ secrets.AHREFS_API_KEY }}
  TWITTER_API_KEY:    ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:      ${{ secrets.WORDPRESS_SITE_ID }}
  GITHUB_REPOSITORY:  "nyspotlightreport/sct-agency-bots"

jobs:
  journey-engine:
    name: "🔁 Run All 5 Journey Sequences"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/email_journey_builder_bot.py

  social:
    name: "📱 Daily Social Posting"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/social_scheduler_bot.py

  cro:
    name: "🧪 Conversion Rate Optimization"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/conversion_optimizer_bot.py

  health-monitor:
    name: "💚 Customer Health Scores"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/customer_health_score_bot.py

  seo:
    name: "🔍 SEO Opportunities"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.schedule == '0 7 * * 1'  # Mondays only (weekly SEO audit)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/seo_audit_agent.py
