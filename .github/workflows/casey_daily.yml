name: "[IT] — Casey Lin IT"
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:             ${{ secrets.GH_PAT }}
  APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
  STRIPE_SECRET_KEY:  ${{ secrets.STRIPE_SECRET_KEY }}
  AHREFS_API_KEY:     ${{ secrets.AHREFS_API_KEY }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:  ${{ secrets.WORDPRESS_SITE_ID }}

jobs:
  run-director:
    name: "Casey Lin IT"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests -q
      - run: python agents/casey_lin_it.py
