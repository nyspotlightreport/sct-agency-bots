name: 🚀 Expansion Bots (Daily)
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: 🔗 Affiliate Deep Linker
        continue-on-error: true
        env:
          WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
          WORDPRESS_SITE_ID: ${{ secrets.WORDPRESS_SITE_ID }}
        run: python bots/affiliate_deep_linker_bot.py
      - name: 📦 Multi-Platform Product Sync
        continue-on-error: true
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          ETSY_SHOP_ID: ${{ secrets.ETSY_SHOP_ID }}
        run: python bots/multi_platform_syncer_bot.py
      - name: 📧 Beehiiv Sequence Check
        continue-on-error: true
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
        run: python bots/beehiiv_sequence_bot.py
