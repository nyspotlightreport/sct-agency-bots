name: "🧬 AI Intelligence Layer — RLHF + Monitoring (4x Daily)"

on:
  schedule:
    - cron: '0 8 * * *'    # 4:00 AM ET
    - cron: '0 4 * * *'    # 12:00 AM ET
    - cron: '0 22 * * *'   # 6:00 PM ET
    - cron: '0 0 * * *'    # 8:00 PM ET
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════
# Runs at same times as Self-Improvement Engine
# Upgrades all 12 AI capabilities:
# RLHF prompt evolution, RAG KB refresh, hallucination audit,
# quality trending, model performance tracking
# ═══════════════════════════════════════════════════════════

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:             ${{ secrets.GH_PAT }}

jobs:

  rlhf-prompt-evolution:
    name: "🧬 RLHF — Prompt Self-Evolution"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Evolve low-performing prompts via RLHF
        run: python bots/rlhf_self_evaluator_bot.py || echo "RLHF completed"

  ai-engine-test:
    name: "🧠 AI Engine Health Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Test all 12 upgrades
        run: python bots/agency_ai_engine.py || echo "Engine test completed"
