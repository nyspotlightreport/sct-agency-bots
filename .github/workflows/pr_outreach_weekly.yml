name: 📰 PR Outreach (Weekly)
on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
jobs:
  pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: 📰 PR + Partnership Outreach
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
        run: |
          python bots/pr_outreach_bot.py
          python bots/partnership_outreach_bot.py
