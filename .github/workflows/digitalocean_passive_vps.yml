name: 🌊 DigitalOcean Passive VPS Setup (One-Time)
on:
  workflow_dispatch:
    inputs:
      droplet_ip:
        description: "Your DigitalOcean droplet IP address"
        required: true
      root_password:
        description: "Root password (from DO email)"
        required: true

jobs:
  setup-vps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔑 Install sshpass
        run: sudo apt-get install -y sshpass -qq
      - name: 🚀 Deploy Passive Income Stack
        env:
          DROPLET_IP: ${{ github.event.inputs.droplet_ip }}
          ROOT_PASS: ${{ github.event.inputs.root_password }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPOCKET_KEY: ${{ secrets.REPOCKET_API_KEY }}
        run: |
          export SSHPASS="${ROOT_PASS}"
          # Copy setup script to server
          sshpass -e scp -o StrictHostKeyChecking=no \
            passive-income/setup.sh root@${DROPLET_IP}:/root/setup.sh
          # Run it
          sshpass -e ssh -o StrictHostKeyChecking=no root@${DROPLET_IP} \
            "GMAIL_USER=${GMAIL_USER} GMAIL_PASS=${GMAIL_PASS} REPOCKET_KEY=${REPOCKET_KEY} bash /root/setup.sh"
          echo "✅ Passive income VPS live at ${DROPLET_IP}"
