name: 🔧 Dev — Daily Engineering Health
on:
  schedule:
    - cron: "0 7 * * *"   # 7am daily (before sales at 8am)
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID:    "8ef722e1-4110-42af-8ddb-ff6c2ce1745e"
  GH_PAT:             ${{ secrets.GH_PAT }}
  GITHUB_REPOSITORY:  "nyspotlightreport/sct-agency-bots"

jobs:
  dev-command:
    name: "🏗️ Dev Commander Health Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/dev_commander_agent.py

  performance:
    name: "⚡ Performance Monitor"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/performance_monitor_bot.py

  error-aggregation:
    name: "🚨 Error Aggregation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python bots/error_aggregator_bot.py

  auto-debug:
    name: "🐛 Auto Debugger"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - run: python agents/auto_debugger_agent.py
