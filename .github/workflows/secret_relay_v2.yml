name: Secret Relay v2 + Supabase Setup
on: workflow_dispatch
permissions:
  contents: read
jobs:
  relay-and-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Copy secrets to live repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          REPO="nyspotlightreport/NY-Spotlight-Report-good"

          echo "=== Checking GH_PAT scopes ==="
          HEADERS=$(curl -sS -I -H "Authorization: token $GH_TOKEN" https://api.github.com/rate_limit 2>&1)
          echo "$HEADERS" | grep -i "x-oauth-scopes" || echo "No scopes header found"

          echo "=== Getting repo public key ==="
          PK_RESPONSE=$(curl -sS -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")

          KEY_ID=$(echo "$PK_RESPONSE" | jq -r '.key_id')
          PUB_KEY=$(echo "$PK_RESPONSE" | jq -r '.key')

          if [ "$KEY_ID" = "null" ] || [ -z "$KEY_ID" ]; then
            echo "::warning::GH_PAT cannot access secrets API. Scopes needed: repo, admin:org"
            echo "Token scopes from header:"
            echo "$HEADERS" | grep -i scope || true
            echo ""
            echo "MANUAL FALLBACK: Set these 5 secrets in NY-Spotlight-Report-good > Settings > Secrets:"
            echo "  PUSHOVER_API_KEY"
            echo "  PUSHOVER_USER_KEY"
            echo "  SUPABASE_URL"
            echo "  SUPABASE_KEY"
            echo "  SUPABASE_SERVICE_KEY"
          else
            pip install pynacl > /dev/null 2>&1

            for SECRET_NAME in PUSHOVER_API_KEY PUSHOVER_USER_KEY SUPABASE_URL SUPABASE_KEY SUPABASE_SERVICE_KEY; do
              SECRET_VALUE="${!SECRET_NAME}"
              if [ -z "$SECRET_VALUE" ]; then
                echo "SKIP: $SECRET_NAME is empty"
                continue
              fi

              ENCRYPTED=$(python3 << PYEOF
from base64 import b64encode, b64decode
from nacl import encoding, public
import os
pk = public.PublicKey(b64decode('$PUB_KEY'))
box = public.SealedBox(pk)
encrypted = box.encrypt(os.environ['$SECRET_NAME'].encode('utf-8'))
print(b64encode(encrypted).decode('utf-8'))
PYEOF
)

              HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
                -X PUT \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/actions/secrets/$SECRET_NAME" \
                -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}")

              echo "$SECRET_NAME -> HTTP $HTTP_CODE"
            done
          fi

      - name: Create Supabase tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "=== Creating site_health_log table ==="
          curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query": "CREATE TABLE IF NOT EXISTS site_health_log (id SERIAL PRIMARY KEY, checked_at TIMESTAMPTZ DEFAULT NOW(), all_passed BOOLEAN, failures TEXT[], details JSONB)"}' \
            2>&1 || true

          echo ""
          echo "=== Creating outreach_log table ==="
          curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query": "CREATE TABLE IF NOT EXISTS outreach_log (id SERIAL PRIMARY KEY, recipient_email TEXT, subject TEXT, status TEXT DEFAULT '\''sent'\'', sent_at TIMESTAMPTZ DEFAULT NOW(), template TEXT, prospect_name TEXT)"}' \
            2>&1 || true

          echo ""
          echo "=== Trying direct SQL via pg endpoint ==="
          # Supabase also supports the SQL endpoint
          SQL="CREATE TABLE IF NOT EXISTS site_health_log (id SERIAL PRIMARY KEY, checked_at TIMESTAMPTZ DEFAULT NOW(), all_passed BOOLEAN, failures TEXT[], details JSONB); CREATE TABLE IF NOT EXISTS outreach_log (id SERIAL PRIMARY KEY, recipient_email TEXT, subject TEXT, status TEXT DEFAULT 'sent', sent_at TIMESTAMPTZ DEFAULT NOW(), template TEXT, prospect_name TEXT);"

          curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc/exec_sql" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"sql\": \"$SQL\"}" \
            2>&1 || true

          echo ""
          echo "=== Verifying tables via PostgREST ==="
          echo "Checking site_health_log..."
          HTTP1=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/site_health_log?limit=1" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          echo "site_health_log -> HTTP $HTTP1"

          echo "Checking outreach_log..."
          HTTP2=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/outreach_log?limit=1" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          echo "outreach_log -> HTTP $HTTP2"

          if [ "$HTTP1" = "200" ] && [ "$HTTP2" = "200" ]; then
            echo "✅ Both tables exist and are accessible"
          else
            echo "⚠️ Tables may need to be created manually via Supabase Dashboard SQL Editor"
            echo "Run this SQL:"
            echo "CREATE TABLE IF NOT EXISTS site_health_log (id SERIAL PRIMARY KEY, checked_at TIMESTAMPTZ DEFAULT NOW(), all_passed BOOLEAN, failures TEXT[], details JSONB);"
            echo "CREATE TABLE IF NOT EXISTS outreach_log (id SERIAL PRIMARY KEY, recipient_email TEXT, subject TEXT, status TEXT DEFAULT 'sent', sent_at TIMESTAMPTZ DEFAULT NOW(), template TEXT, prospect_name TEXT);"
          fi
