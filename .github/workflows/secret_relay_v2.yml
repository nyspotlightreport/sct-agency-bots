name: Secret Relay v2
on: workflow_dispatch
permissions:
  contents: read
jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Set secrets in live repo via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Check GH_PAT scopes
          echo "Checking token scopes..."
          curl -sS -H "Authorization: token $GH_TOKEN" https://api.github.com/rate_limit -D /dev/stderr 2>&1 | grep -i "x-oauth-scopes" || true
          
          # Try setting via GitHub API directly (bypasses gh CLI scope check)
          REPO="nyspotlightreport/NY-Spotlight-Report-good"
          
          # Get public key for secret encryption
          echo "Getting public key..."
          PK_RESPONSE=$(curl -sS -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/secrets/public-key")
          echo "Response: $PK_RESPONSE"
          
          KEY_ID=$(echo "$PK_RESPONSE" | jq -r '.key_id')
          PUB_KEY=$(echo "$PK_RESPONSE" | jq -r '.key')
          
          if [ "$KEY_ID" = "null" ] || [ -z "$KEY_ID" ]; then
            echo "ERROR: Cannot get public key. Token likely lacks repo scope."
            echo "Falling back to direct gh secret set..."
            
            # Try with gh CLI using the runner's GITHUB_TOKEN won't work cross-repo
            # So let's output what's needed for manual setup
            echo "::error::GH_PAT needs 'repo' scope to set secrets cross-repo"
            exit 1
          fi
          
          # Install sodium for encryption
          pip install pynacl > /dev/null 2>&1
          
          # Encrypt and set each secret
          for SECRET_NAME in PUSHOVER_API_KEY PUSHOVER_USER_KEY SUPABASE_URL SUPABASE_KEY SUPABASE_SERVICE_KEY; do
            SECRET_VALUE="${!SECRET_NAME}"
            if [ -z "$SECRET_VALUE" ]; then
              echo "SKIP: $SECRET_NAME is empty"
              continue
            fi
            
            ENCRYPTED=$(python3 -c "
from base64 import b64encode, b64decode
from nacl import encoding, public
import sys
pk = public.PublicKey(b64decode('$PUB_KEY'))
box = public.SealedBox(pk)
encrypted = box.encrypt('$SECRET_VALUE'.encode('utf-8'))
print(b64encode(encrypted).decode('utf-8'))
")
            
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/secrets/$SECRET_NAME" \
              -d "{\"encrypted_value\":\"$ENCRYPTED\",\"key_id\":\"$KEY_ID\"}")
            
            echo "$SECRET_NAME -> HTTP $HTTP_CODE"
          done
