name: Secret Relay v2
on: workflow_dispatch
jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Relay secrets to live repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "${{ secrets.PUSHOVER_API_KEY }}" | gh secret set PUSHOVER_API_KEY -R nyspotlightreport/NY-Spotlight-Report-good
          echo "${{ secrets.PUSHOVER_USER_KEY }}" | gh secret set PUSHOVER_USER_KEY -R nyspotlightreport/NY-Spotlight-Report-good
          echo "${{ secrets.SUPABASE_KEY }}" | gh secret set SUPABASE_KEY -R nyspotlightreport/NY-Spotlight-Report-good
          echo "Done - 3 secrets relayed"
