name: 🔑 Save OAuth Token to GitHub Secrets

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Secret name (e.g. LINKEDIN_ACCESS_TOKEN)'
        required: true
      secret_value:
        description: 'Secret value to save'
        required: true

jobs:
  save-secret:
    name: Save Secret via PyNaCl
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install PyNaCl requests -q
      - name: Encrypt and Save Secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_NAME: ${{ github.event.inputs.secret_name }}
          SECRET_VALUE: ${{ github.event.inputs.secret_value }}
        run: |
          python3 << 'PYEOF'
          import os, json, base64, urllib.request
          from nacl import encoding, public as nacl_public

          GH_TOKEN    = os.environ['GH_TOKEN']
          REPO        = "nyspotlightreport/sct-agency-bots"
          SECRET_NAME  = os.environ['SECRET_NAME']
          SECRET_VALUE = os.environ['SECRET_VALUE']
          HEADERS      = {'Authorization': f'token {GH_TOKEN}', 'Content-Type': 'application/json',
                          'Accept': 'application/vnd.github.v3+json'}

          # Get public key
          req = urllib.request.Request(
              f'https://api.github.com/repos/{REPO}/actions/secrets/public-key', headers=HEADERS)
          with urllib.request.urlopen(req, timeout=10) as r:
              key_data = json.load(r)

          # Encrypt
          pk  = nacl_public.PublicKey(key_data['key'].encode(), encoding.Base64Encoder())
          box = nacl_public.SealedBox(pk)
          enc = base64.b64encode(box.encrypt(SECRET_VALUE.encode())).decode()

          # Save
          data = json.dumps({'encrypted_value': enc, 'key_id': key_data['key_id']}).encode()
          req2 = urllib.request.Request(
              f'https://api.github.com/repos/{REPO}/actions/secrets/{SECRET_NAME}',
              data=data, method='PUT', headers=HEADERS)
          with urllib.request.urlopen(req2, timeout=15) as r:
              print(f'✅ {SECRET_NAME} saved (HTTP {r.status})')
          PYEOF
