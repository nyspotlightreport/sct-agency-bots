name: Article Image Generator -- DALL-E 3 Editorial Photos
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no API calls)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-article-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bots repo
        uses: actions/checkout@v4

      - name: Checkout live site repo
        uses: actions/checkout@v4
        with:
          repository: nyspotlightreport/NY-Spotlight-Report-good
          token: ${{ secrets.GITHUB_TOKEN }}
          path: site-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openai -q

      - name: Generate article images via DALL-E 3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 << 'PYEOF'
          import os, requests, base64, time
          from pathlib import Path

          openai_key = os.environ['OPENAI_API_KEY']
          dry_run = os.environ['DRY_RUN'] == 'true'
          img_dir = Path('site-repo/images/articles')
          img_dir.mkdir(parents=True, exist_ok=True)

          articles = [
            ('oscars-2026-predictions', 'Academy Awards Oscars 2026 red carpet Hollywood glamour cinema'),
            ('hells-kitchen-gay-nightlife-capital', 'NYC Hell Kitchen gay nightlife vibrant bars neon lights'),
            ('100-million-broadway-season-2024', 'Broadway theater New York City bright lights marquee stage'),
            ('nyfw-2026-recap', 'New York Fashion Week runway show elegant fashion designer'),
            ('pride-2026-nyc-events', 'NYC Pride parade celebration rainbow diversity community'),
            ('tony-awards-2026-preview', 'Tony Awards Broadway theater award show stage spotlight'),
            ('ultimate-nyc-nightlife-guide', 'New York City nightlife skyline Manhattan evening lights'),
            ('lgbtq-bars-clubs-nyc-guide', 'NYC LGBTQ bar club community vibrant inclusive nightlife'),
            ('evolution-of-drag-culture', 'Drag culture performance art vibrant costume makeup stage'),
            ('rooftop-bars-nyc-2026', 'NYC rooftop bar Manhattan skyline sunset cocktails'),
          ]

          print(f"Processing {len(articles)} articles. Dry run: {dry_run}")
          generated = 0

          for slug, prompt in articles:
            img_path = img_dir / f"{slug}.jpg"
            if img_path.exists():
              print(f"SKIP (exists): {slug}")
              continue

            print(f"Generating: {slug}")
            if dry_run:
              print(f"[DRY RUN]: {prompt[:60]}")
              continue

            try:
              r = requests.post(
                'https://api.openai.com/v1/images/generations',
                headers={'Authorization': f'Bearer {openai_key}', 'Content-Type': 'application/json'},
                json={'model': 'dall-e-3', 'prompt': f'Editorial photography for NYC entertainment news: {prompt}. Professional photojournalism style, dramatic lighting, cinematic composition.', 'size': '1792x1024', 'quality': 'standard', 'n': 1},
                timeout=60
              )
              if r.status_code != 200:
                print(f"DALL-E error {r.status_code}: {r.text[:100]}")
                continue

              img_url = r.json()['data'][0]['url']
              img_data = requests.get(img_url, timeout=30).content
              img_path.write_bytes(img_data)
              print(f"SAVED: {slug} ({len(img_data)} bytes)")
              generated += 1
              time.sleep(2)

            except Exception as e:
              print(f"ERROR {slug}: {e}")
              continue

          print(f"Done. Generated {generated} new images.")
          PYEOF

      - name: Commit and push images to live site
        run: |
          cd site-repo
          git config user.name "NYSR Image Bot"
          git config user.email "bots@nyspotlightreport.com"
          git add images/articles/
          if git diff --staged --quiet; then
            echo "No new images to commit"
          else
            COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "Add $COUNT DALL-E 3 editorial images for articles"
            git push
            echo "Pushed $COUNT images to live repo"
          fi
