name: 🧠 Learning & Self-Correction (3x Daily)
on:
  schedule:
    - cron: "0 6,14,22 * * *"
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT:            ${{ secrets.GH_PAT }}
  GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
  NTFY_CHANNEL:      ${{ secrets.NTFY_CHANNEL }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

jobs:
  learn:
    name: "🧠 System Health + Learning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Collect health data + run AI analysis
        run: python agents/system_learning_engine.py
      - name: Commit learnings
        run: |
          git config user.name "James Butler"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/learning/ -A 2>/dev/null || true
          git diff --cached --quiet || git commit -m "learning: $(date +%Y-%m-%d-%H%M)"
          git push || echo "clean"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
