name: 🛒 Multi-Store Setup (Payhip + LemonSqueezy)
on:
  workflow_dispatch:
    inputs:
      store:
        description: 'Which store to setup'
        required: true
        default: 'both'
        type: choice
        options: [payhip, lemonsqueezy, both]

jobs:
  setup-stores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests reportlab -q
      - name: Generate PDFs
        run: |
          python3 bots/create_gumroad_pdfs.py 2>/dev/null || echo "PDFs already exist"
      - name: Setup Payhip Store
        if: ${{ inputs.store == 'payhip' || inputs.store == 'both' }}
        env:
          PAYHIP_API_KEY: ${{ secrets.PAYHIP_API_KEY }}
        run: python3 bots/payhip_store_bot.py
      - name: Setup LemonSqueezy Store
        if: ${{ inputs.store == 'lemonsqueezy' || inputs.store == 'both' }}
        env:
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
        run: python3 bots/lemonsqueezy_store_bot.py
      - name: Report Results
        run: |
          echo "=== STORE SETUP COMPLETE ==="
          cat payhip_products.json 2>/dev/null || echo "Payhip: check API key"
          cat lemonsqueezy_products.json 2>/dev/null || echo "LS: check API key"
