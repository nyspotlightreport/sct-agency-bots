name: 🐕 Watchdog — Monitor All Workflows + Notify Phone

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4

      - name: Check all workflow statuses
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          FAILURES=""
          SUCCESSES=""
          
          # Get latest run for each workflow
          WORKFLOWS=$(gh api "/repos/$REPO/actions/workflows" --jq '.workflows[].name')
          
          while IFS= read -r wf; do
            STATUS=$(gh api "/repos/$REPO/actions/workflows" \
              --jq ".workflows[] | select(.name==\"$wf\") | .id" | \
              xargs -I{} gh api "/repos/$REPO/actions/workflows/{}/runs?per_page=1" \
              --jq '.workflow_runs[0] | "\(.conclusion // .status)"' 2>/dev/null || echo "unknown")
            
            if [[ "$STATUS" == "failure" ]] || [[ "$STATUS" == "cancelled" ]]; then
              FAILURES="$FAILURES\n❌ $wf: $STATUS"
            elif [[ "$STATUS" == "success" ]]; then
              SUCCESSES="$SUCCESSES ✅"
            fi
          done <<< "$WORKFLOWS"
          
          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          
          # Send daily summary
          curl -s \
            -H "Title: 📊 NYSR Daily Bot Report" \
            -H "Tags: chart_increasing,robot" \
            -H "Priority: default" \
            -d "Workflows OK: $(echo "$SUCCESSES" | wc -c) chars | Issues: ${FAILURES:-None}" \
            "https://ntfy.sh/nysr-chairman1sct"

      - name: Alert on failures
        if: steps.check.outputs.failures != ''
        run: |
          curl -s \
            -H "Title: 🚨 NYSR Bot Failure — Action Needed" \
            -H "Tags: warning,robot" \
            -H "Priority: high" \
            -H "Actions: view, Open GitHub, https://github.com/${{ github.repository }}/actions" \
            -d "Failed workflows: ${{ steps.check.outputs.failures }}\n\nOpen GitHub Actions to see details." \
            "https://ntfy.sh/nysr-chairman1sct"
