name: Weekly KPI Report
on:
  schedule:
    - cron: '0 13 * * 1'   # Monday 8am ET
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests
      - run: python bots/weekly_report_bot_v2.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          CHAIRMAN_EMAIL:    ${{ secrets.CHAIRMAN_EMAIL }}
          AHREFS_API_KEY:    ${{ secrets.AHREFS_API_KEY }}
          HUBSPOT_API_KEY:   ${{ secrets.HUBSPOT_API_KEY }}
          TARGET_DOMAIN:     ${{ secrets.TARGET_DOMAIN }}