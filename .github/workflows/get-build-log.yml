name: Get Build Log
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy and capture log
        env:
          TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          SITE: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, time

          token = os.environ['TOKEN']
          site = os.environ['SITE']

          # Trigger a new deploy
          print("Triggering new deploy...")
          build_req = urllib.request.Request(
            f'https://api.netlify.com/api/v1/sites/{site}/builds',
            data=b'{}',
            headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'},
            method='POST'
          )
          build_resp = urllib.request.urlopen(build_req)
          build_data = json.loads(build_resp.read())
          deploy_id = build_data.get('deploy_id', '')
          build_id = build_data.get('id', '')
          print(f'Deploy ID: {deploy_id}')
          print(f'Build ID: {build_id}')

          # Poll for build log
          for attempt in range(30):
            time.sleep(10)
            print(f'\n--- Poll attempt {attempt+1} ---')

            # Check deploy state
            state_req = urllib.request.Request(
              f'https://api.netlify.com/api/v1/deploys/{deploy_id}',
              headers={'Authorization': f'Bearer {token}'}
            )
            state_resp = urllib.request.urlopen(state_req)
            state_data = json.loads(state_resp.read())
            state = state_data.get('state', 'unknown')
            print(f'State: {state}')

            if state in ('error', 'ready'):
              print(f'Error: {state_data.get("error_message", "none")}')

              # Try to get build log
              try:
                log_req = urllib.request.Request(
                  f'https://api.netlify.com/api/v1/builds/{build_id}/log',
                  headers={'Authorization': f'Bearer {token}'}
                )
                log_resp = urllib.request.urlopen(log_req)
                content = log_resp.read().decode('utf-8', errors='replace')
                lines = content.strip().split('\n')
                print(f'\n=== BUILD LOG ({len(lines)} lines) ===')
                for line in lines:
                  try:
                    entry = json.loads(line)
                    print(entry.get('message', ''))
                  except:
                    print(line[:300])
              except Exception as e:
                print(f'Log fetch failed: {e}')
              break

          if state == 'building':
            print('Build still in progress after 5 min timeout')
          PYEOF
