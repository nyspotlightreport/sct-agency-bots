name: 📊 Weekly Learning + ROI (Sundays)
on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
  BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
  AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
  PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT: ${{ secrets.GH_PAT }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

jobs:
  weekly-learning:
    name: "🧠 Weekly Performance Learning"
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Run performance memory engine
        run: python agents/performance_memory_engine.py
      - name: Run ROI optimizer
        continue-on-error: true
        run: python agents/strategic_roi_optimizer.py
      - name: Run SEO audit
        continue-on-error: true
        run: python agents/ahrefs_seo_intelligence.py
      - name: Regenerate sitemap
        continue-on-error: true
        run: python bots/sitemap_generator_bot.py
      - name: PR outreach batch
        continue-on-error: true
        run: python bots/pr_outreach_bot.py
      - name: SERP domination run
        continue-on-error: true
        run: python bots/serp_domination_engine.py
