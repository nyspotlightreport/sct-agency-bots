name: 🎯 CRM — Daily Lead Pull + Pipeline Sync
on:
  schedule:
    - cron: "0 9 * * *"   # 9am daily
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:             ${{ secrets.GH_PAT }}
  GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}

jobs:
  crm-sync:
    name: "🎯 CRM Lead Pull + Scoring"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Pull Apollo leads + score + sync
        run: python agents/crm_core_agent.py
        continue-on-error: true

  pipeline-analysis:
    name: "📊 Pipeline Analysis + Forecast"
    needs: crm-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Analyze pipeline + send daily brief
        run: python bots/deal_pipeline_bot.py
        continue-on-error: true

  hubspot-sync:
    name: "🔗 HubSpot Sync"
    needs: crm-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Sync high-value leads to HubSpot
        run: python bots/hubspot_fixer_bot.py
        continue-on-error: true
