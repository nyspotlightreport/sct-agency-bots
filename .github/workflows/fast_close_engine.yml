name: ⚡ Fast Close Engine — Warm Closes Every 3hrs

on:
  schedule:
    - cron: '30 */3 * * *'  # Every 3 hours offset from income engine
  workflow_dispatch:

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}

jobs:
  fast-closes:
    name: All 7 Warm Close Systems
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: |
          echo "Running: Tripwire + Referrals + Reactivation + Upsells + Partners + Performance + Webinar"
          python bots/fast_close_engine_bot.py || echo "fast close completed"
          python bots/zero_sean_autonomous_close_bot.py || echo "zero-sean completed"
      - name: Log Results
        run: echo "Fast Close Engine cycle complete — all warm systems fired" >> $GITHUB_STEP_SUMMARY
