name: 🚀 Viral Launch Assets (Weekly)
on:
  schedule:
    - cron: "0 8 * * 2"
  workflow_dispatch:
jobs:
  viral:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install requests -q
      - name: Generate viral launch assets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python bots/viral_launch_bot.py
          python bots/producthunt_launch_bot.py
