name: One-Time Secret Relay
on: workflow_dispatch
jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Set secrets in live repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PUSHOVER_API_KEY: ${{ secrets.PUSHOVER_API_KEY }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "$PUSHOVER_API_KEY" | gh secret set PUSHOVER_API_KEY -R nyspotlightreport/NY-Spotlight-Report-good
          echo "$PUSHOVER_USER_KEY" | gh secret set PUSHOVER_USER_KEY -R nyspotlightreport/NY-Spotlight-Report-good
          echo "$SUPABASE_URL" | gh secret set SUPABASE_URL -R nyspotlightreport/NY-Spotlight-Report-good
          echo "$SUPABASE_KEY" | gh secret set SUPABASE_KEY -R nyspotlightreport/NY-Spotlight-Report-good
          echo "All 4 secrets relayed successfully"
