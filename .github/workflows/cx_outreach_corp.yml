name: 🎯 CX & Revenue Outreach — Morgan Ellis Corp

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours — always on
  workflow_dispatch:

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  GH_PAT:               ${{ secrets.GITHUB_TOKEN }}
  BEEHIIV_API_KEY:      ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID:       ${{ secrets.BEEHIIV_PUB_ID }}
  CALENDLY_TOKEN:       ${{ secrets.CALENDLY_TOKEN }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  TICKET_TAILOR_API_KEY: ${{ secrets.TICKET_TAILOR_API_KEY }}

jobs:

  # TIER 1: Core CX Operations
  inbound-cx:
    name: Inbound CX — Tickets + Chat + SLA
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/cx_director_agent.py || echo "director completed"
      - run: python bots/cx_live_chat_bot.py || echo "chat completed"

  # TIER 2: Outbound SDR
  outbound-sdr:
    name: Outbound SDR — Apollo + Sequences + Objections
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/cx_intelligence_bot.py || echo "intel completed"
      - run: python bots/cx_objection_handler_bot.py || echo "objections completed"
      - run: python bots/cold_email_personalization_bot.py || echo "cold email completed"

  # TIER 3: Appointments + CSAT + Referrals
  appointments-csat:
    name: Appointments + CSAT + Referral Engine
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/cx_appointment_setter_bot.py || echo "appointments completed"
      - run: python bots/cx_csat_nps_bot.py || echo "csat completed"
      - run: python bots/referral_engine_bot.py || echo "referral completed"

  # TIER 4: ALL DEPARTMENT INTEGRATIONS — runs every 3hrs
  cx-integration-hub:
    name: CX Integration Hub — All 16 Departments
    runs-on: ubuntu-latest
    needs: [inbound-cx, outbound-sdr, appointments-csat]
    if: always()
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Run CX Integration Hub
        run: python bots/cx_integration_hub_bot.py || echo "integration hub completed"

  # TIER 5: RSI — CX self-evaluates and improves
  cx-rsi:
    name: CX RSI — Self-Evaluate + Propose Improvements
    runs-on: ubuntu-latest
    needs: [cx-integration-hub]
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: CX RSI evaluation
        run: |
          python3 /dev/stdin << 'PYEOF'
          import os, json, urllib.request, datetime

          SUPA = os.environ.get("SUPABASE_URL","")
          KEY  = os.environ.get("SUPABASE_KEY") or os.environ.get("SUPABASE_ANON_KEY","")
          PUSH = os.environ.get("PUSHOVER_API_KEY","")
          USER = os.environ.get("PUSHOVER_USER_KEY","")
          today = datetime.date.today().isoformat()

          if not SUPA: exit(0)

          def supa(method, table, data=None, query=""):
            req = urllib.request.Request(f"{SUPA}/rest/v1/{table}{query}",
              data=json.dumps(data).encode() if data else None, method=method,
              headers={"apikey":KEY,"Authorization":f"Bearer {KEY}",
                       "Content-Type":"application/json","Prefer":"return=representation"})
            try:
              with urllib.request.urlopen(req, timeout=10) as r:
                b = r.read(); return json.loads(b) if b else {}
            except: return None

          open_t   = supa("GET","tickets","","?status=eq.open&select=id") or []
          sla_b    = supa("GET","tickets","","?sla_breached=eq.true&select=id") or []
          meetings = supa("GET","appointments","","?status=in.(confirmed,completed)&select=id") or []
          seqs     = supa("GET","outreach_sequences","","?status=eq.active&select=id") or []

          fitness = round(min(1.0,(
            (1.0 if not open_t else max(0.5,1-len(open_t)*0.03))*0.3+
            (1.0 if not sla_b else max(0.3,1-len(sla_b)*0.1))*0.3+
            min(1.0,len(meetings)/5)*0.2+
            min(1.0,len(seqs)/10)*0.2
          )),3)

          supa("PATCH","synthetic_orgs",{
            "fitness_score":fitness,
            "last_run":datetime.datetime.utcnow().isoformat(),
            "metrics":{"open_tickets":len(open_t),"sla_breaches":len(sla_b),
                       "meetings":len(meetings),"active_sequences":len(seqs)}
          },"?org_id=eq.cx_outreach_corp")

          msg = (f"CX RSI: {fitness:.0%} fitness\n"
                 f"Tickets: {len(open_t)} | SLA breaches: {len(sla_b)}\n"
                 f"Meetings: {len(meetings)} | Sequences: {len(seqs)}")
          print(msg)

          if PUSH and USER and (len(open_t) > 5 or len(sla_b) > 0):
            data = json.dumps({"token":PUSH,"user":USER,"title":"CX Alert",
              "message":msg,"priority":1 if len(sla_b)>0 else 0}).encode()
            req = urllib.request.Request("https://api.pushover.net/1/messages.json",
              data=data, headers={"Content-Type":"application/json"})
            try: urllib.request.urlopen(req, timeout=10)
            except: pass
          PYEOF
