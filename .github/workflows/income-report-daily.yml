name: 💹 Income Streams Report (Daily)

on:
  schedule:
    - cron: '0 7 * * *'   # 7 AM UTC daily
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 💹 Generate Income Report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          HONEYGAIN_EMAIL: ${{ secrets.HONEYGAIN_EMAIL }}
          HONEYGAIN_PASS: ${{ secrets.HONEYGAIN_PASS }}
          EARNAPP_API_KEY: ${{ secrets.EARNAPP_API_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: python bots/multi_platform_income_bot.py
      - name: Save report
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/income_report.json || true
          git diff --staged --quiet || git commit -m "💹 Income report $(date +%Y-%m-%d)"
          git push || true
