name: Phase 5 — BI + Customer 360 Daily

on:
  schedule:
    - cron: '30 7 * * *'   # 7:30am daily — after health check, before all others
  workflow_dispatch:

env:
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  STRIPE_SECRET_KEY:  ${{ secrets.STRIPE_SECRET_KEY }}
  HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}

jobs:
  bi-analytics:
    name: 📊 BI Analytics + Customer 360
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Run BI Analytics Agent
        run: python agents/bi_analytics_agent.py
      - name: Summary
        if: always()
        run: |
          echo "## 📊 Phase 5 BI Report" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Dashboard: https://nyspotlightreport.com/bi/" >> $GITHUB_STEP_SUMMARY
          echo "MRR Target: \$15k-50k/mo" >> $GITHUB_STEP_SUMMARY
