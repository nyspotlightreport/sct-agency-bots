name: 💰 7 Parallel Closing Engines — Every 2 Hours

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  ELEVENLABS_API_KEY:   ${{ secrets.ELEVENLABS_API_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  GH_PAT:               ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ENGINE 1: Cold email 7-touch sequence
  engine-1-cold:
    name: "E1: 7-Touch Cold — 200/day Apollo"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/seven_touch_close_sequence_bot.py || echo "7-touch completed"
      - run: python bots/cold_email_personalization_bot.py || echo "personalization completed"
      - run: python agents/master_sales_agent.py || echo "sales agent completed"

  # ENGINE 2: 1099 rep scoring + activation
  engine-2-reps:
    name: "E2: 1099 Rep Army — Score + Activate"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/rep_performance_scoring_bot.py || echo "rep scoring completed"
      - run: python bots/rep_onboarding_bot.py || echo "rep onboarding completed"
      - run: python bots/zero_sean_autonomous_close_bot.py || echo "zero-sean completed"

  # ENGINE 3: Webinar funnel + follow-up
  engine-3-webinar:
    name: "E3: Automated Webinar — 24/7 Funnel"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/automated_webinar_funnel_bot.py || echo "webinar engine completed"
      - run: python bots/cx_appointment_setter_bot.py || echo "appointments completed"

  # ENGINE 4: Content/SEO inbound
  engine-4-content:
    name: "E4: Content Flywheel — SEO + Lead Magnet"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/social_scheduler_bot.py || echo "social completed"
      - run: python bots/wordpress_blogger_bot.py || echo "wp completed"
      - run: python bots/content_qa_gate_bot.py || echo "content qa completed"

  # ENGINE 5: Agency partnership outreach
  engine-5-partners:
    name: "E5: Agency Partnerships — B2B Channel"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/agency_partnership_bot.py || echo "partnerships completed"
      - run: python bots/fast_close_engine_bot.py || echo "fast close completed"

  # ENGINE 6: Referral engine
  engine-6-referrals:
    name: "E6: Referral Engine — $0 CAC"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/referral_engine_bot.py || echo "referrals completed"
      - run: python bots/annual_prepay_offer_bot.py || echo "annual prepay completed"

  # ENGINE 7: Lead capture → 7-day nurture → close
  engine-7-nurture:
    name: "E7: Lead Magnet → Nurture → Paid"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/email_journey_builder_bot.py || echo "journeys completed"
      - run: python bots/upsell_crosssell_bot.py || echo "upsell completed"

  # SYNTHESIS: Revenue report every 2 hours
  engine-synthesis:
    name: "Synthesis: Revenue Velocity Report"
    runs-on: ubuntu-latest
    needs: [engine-1-cold, engine-2-reps, engine-3-webinar, engine-4-content, engine-5-partners, engine-6-referrals, engine-7-nurture]
    if: always()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/guaranteed_income_agent.py || echo "income agent completed"
