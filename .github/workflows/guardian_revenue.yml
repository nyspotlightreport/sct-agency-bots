name: "🛡️ Guardian + Always Hunting — Every 30min"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  SMTP_USER:            ${{ secrets.SMTP_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  BUSINESS_EMAIL:       ${{ secrets.BUSINESS_EMAIL }}
  REPLY_TO_EMAIL:       ${{ secrets.REPLY_TO_EMAIL }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET:${{ secrets.TWITTER_ACCESS_SECRET }}
  HUBSPOT_PORTAL_ID:    "245581177"
  STORE_URL:            "https://nyspotlightreport.com/store/"

jobs:
  health-check:
    name: "🛡️ System Health"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/guardian_health_check_bot.py || echo "completed"

  always-hunting:
    name: "🎯 Hunting New Customers"
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/always_hunting_bot.py || echo "completed"
