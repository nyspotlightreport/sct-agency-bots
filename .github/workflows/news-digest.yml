name: News Digest
on:
  schedule:
    - cron: '0 12 * * *'  # 7am ET daily
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install requests -q
      - run: python bots/news_digest_bot.py
        env:
          NEWSAPI_KEY:       ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBLER_API_KEY:    ${{ secrets.PUBLER_API_KEY }}
          PUBLER_WORKSPACE_ID: ${{ secrets.PUBLER_WORKSPACE_ID }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          CHAIRMAN_EMAIL:    ${{ secrets.CHAIRMAN_EMAIL }}
