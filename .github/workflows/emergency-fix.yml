name: NYSR Emergency Fix
on:
  push:
    paths:
      - '.github/workflows/emergency-fix.yml'
  workflow_dispatch:
jobs:
  fix-everything:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fix GH_PAT Migration
        run: |
          find .github/workflows/ -name "*.yml" -exec sed -i 's/secrets\.GH_PAT/secrets.GITHUB_TOKEN/g' {} \;
          REMAINING=$(grep -rl "secrets\.GH_PAT" .github/workflows/ | wc -l)
          echo "PAT references remaining: $REMAINING"
          git config user.email "actions@github.com"
          git config user.name "NYSR Fix"
          git add .github/workflows/
          git diff --staged --quiet || git commit -m "fix: complete PAT migration"
          git push origin main

      - name: Set OPENAI Key in Repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "$OPENAI_API_KEY" | gh secret set OPENAI_API_KEY --repo nyspotlightreport/sct-agency-bots
          echo "$OPENAI_API_KEY" | gh secret set OPENAI_API_KEY --repo nyspotlightreport/NY-Spotlight-Report-good
          echo "OPENAI key set in both repos via secret"

      - name: Clear Netlify Cache
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          curl -s -X POST "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/builds" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"clear_cache":true}'
          echo "Netlify cache cleared"

      - name: Fix Sweepstakes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Sweepstakes pipeline fix — see separate workflow"
