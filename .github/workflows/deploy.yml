name: Deploy Site to Netlify
on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch:

jobs:
  deploy:
    name: "🚀 Deploy to Netlify"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Netlify CLI
        run: npm install -g netlify-cli -q
      - name: Set env vars
        run: |
          netlify env:set ANTHROPIC_API_KEY "${{ secrets.ANTHROPIC_API_KEY }}" --site-id ${{ secrets.NETLIFY_SITE_ID }} || true
          netlify env:set STRIPE_SECRET_KEY "${{ secrets.STRIPE_SECRET_KEY }}" --site-id ${{ secrets.NETLIFY_SITE_ID }} || true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      - name: Deploy to Netlify
        run: |
          netlify deploy --prod --dir site             --functions site/netlify/functions             --site ${{ secrets.NETLIFY_SITE_ID }}             --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}             --message "Deploy $(date +%Y-%m-%d-%H%M)"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      - name: Verify deployment
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nyspotlightreport.com)
          echo "Site status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Site may be down (status $STATUS)"
          else
            echo "✅ Site healthy"
          fi
