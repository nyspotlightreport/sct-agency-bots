name: System Health Check (Pre-Flight)

on:
  schedule:
    - cron: '0 6 * * *'   # 6am daily — before all other workflows
  workflow_dispatch:

env:
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  GH_PAT:             ${{ secrets.GH_PAT }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
  NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
  HUBSPOT_API_KEY:    ${{ secrets.HUBSPOT_API_KEY }}
  APOLLO_API_KEY:     ${{ secrets.APOLLO_API_KEY }}
  STRIPE_SECRET_KEY:  ${{ secrets.STRIPE_SECRET_KEY }}
  GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}

jobs:
  health-check:
    name: Run Self-Healing Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests PyNaCl --quiet
      - name: Run Health Check
        id: health
        run: |
          python bots/self_healing_bot.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Generate Health Summary
        run: |
          echo "## 🏥 NYSR System Health Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.health.outputs.exit_code }}" == "0" ]; then
            echo "✅ All systems operational" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Issues detected — see logs above" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Systems Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Supabase DB" >> $GITHUB_STEP_SUMMARY
          echo "- Anthropic API" >> $GITHUB_STEP_SUMMARY
          echo "- Netlify (site + API)" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Workflows" >> $GITHUB_STEP_SUMMARY
          echo "- HubSpot CRM" >> $GITHUB_STEP_SUMMARY
          echo "- Apollo Pro" >> $GITHUB_STEP_SUMMARY
          echo "- Stripe" >> $GITHUB_STEP_SUMMARY
          echo "- Gumroad" >> $GITHUB_STEP_SUMMARY

  secrets-audit:
    name: Secrets Completeness Audit
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Secrets
        run: |
          MISSING=0
          check_secret() {
            if [ -z "$1" ]; then
              echo "❌ MISSING: $2"
              MISSING=$((MISSING+1))
            else
              echo "✅ SET: $2"
            fi
          }
          check_secret "${{ secrets.SUPABASE_URL }}"       "SUPABASE_URL"
          check_secret "${{ secrets.SUPABASE_ANON_KEY }}"  "SUPABASE_ANON_KEY"
          check_secret "${{ secrets.ANTHROPIC_API_KEY }}"  "ANTHROPIC_API_KEY"
          check_secret "${{ secrets.GH_PAT }}"             "GH_PAT"
          check_secret "${{ secrets.NETLIFY_AUTH_TOKEN }}" "NETLIFY_AUTH_TOKEN"
          check_secret "${{ secrets.HUBSPOT_API_KEY }}"    "HUBSPOT_API_KEY"
          check_secret "${{ secrets.APOLLO_API_KEY }}"     "APOLLO_API_KEY"
          check_secret "${{ secrets.STRIPE_SECRET_KEY }}"  "STRIPE_SECRET_KEY"
          check_secret "${{ secrets.PUSHOVER_API_KEY }}"   "PUSHOVER_API_KEY"
          check_secret "${{ secrets.SHOPIFY_ACCESS_TOKEN }}" "SHOPIFY_ACCESS_TOKEN (Phase 3)"
          check_secret "${{ secrets.LINKEDIN_ACCESS_TOKEN }}" "LINKEDIN_ACCESS_TOKEN"
          echo "--- Missing: $MISSING secrets ---"
          if [ $MISSING -gt 3 ]; then
            echo "⚠️  Warning: $MISSING secrets missing"
          fi
