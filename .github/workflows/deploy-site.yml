name: Deploy Site to Netlify
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'netlify/**'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: Install netlify CLI
        run: npm install -g netlify-cli
      - name: Set Netlify env vars
        working-directory: site
        run: |
          netlify env:set GMAIL_USER      "$GMAIL_USER_VAL"   || true
          netlify env:set GMAIL_APP_PASS  "$GMAIL_PASS_VAL"   || true
          netlify env:set ANTHROPIC_API_KEY "$ANTHROPIC_KEY_VAL" || true
          netlify env:set HUBSPOT_API_KEY "$HUBSPOT_KEY_VAL"  || true
        env:
          GMAIL_USER_VAL:     ${{ secrets.GMAIL_USER }}
          GMAIL_PASS_VAL:     ${{ secrets.GMAIL_APP_PASS }}
          ANTHROPIC_KEY_VAL:  ${{ secrets.ANTHROPIC_API_KEY }}
          HUBSPOT_KEY_VAL:    ${{ secrets.HUBSPOT_API_KEY }}
      - name: Install site dependencies
        working-directory: site
        run: npm install
      - name: Deploy to Netlify
        working-directory: site
        run: |
          netlify deploy --prod \
            --dir . \
            --functions netlify/functions \
            --message "Deploy from GitHub Actions"
          echo "Deploy complete"
