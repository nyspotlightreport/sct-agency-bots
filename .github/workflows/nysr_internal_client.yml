name: 🏆 NYSR Internal Client — Growth Operations

on:
  schedule:
    - cron: '0 9 * * *'    # 9am daily — NYSR's own growth ops
  workflow_dispatch:

# NYSR uses its own system to grow itself.
# This is the agency running its own products as client #1.
# Every tool we sell to clients runs on us first.

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:    ${{ secrets.SUPABASE_ANON_KEY }}
  ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
  APOLLO_API_KEY:       ${{ secrets.APOLLO_API_KEY }}
  HUBSPOT_API_KEY:      ${{ secrets.HUBSPOT_API_KEY }}
  AHREFS_API_KEY:       ${{ secrets.AHREFS_API_KEY }}
  STRIPE_SECRET_KEY:    ${{ secrets.STRIPE_SECRET_KEY }}
  PUSHOVER_API_KEY:     ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:    ${{ secrets.PUSHOVER_USER_KEY }}
  GH_PAT:               ${{ secrets.GH_PAT }}
  GMAIL_USER:           ${{ secrets.GMAIL_USER }}
  GMAIL_APP_PASS:       ${{ secrets.GMAIL_APP_PASS }}
  TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
  WORDPRESS_ACCESS_TOKEN: ${{ secrets.WORDPRESS_ACCESS_TOKEN }}
  WORDPRESS_SITE_ID:    ${{ secrets.WORDPRESS_SITE_ID }}
  BEEHIIV_API_KEY:      ${{ secrets.BEEHIIV_API_KEY }}
  BEEHIIV_PUB_ID:       ${{ secrets.BEEHIIV_PUB_ID }}
  LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}

jobs:
  # NYSR's own lead generation
  nysr-lead-gen:
    name: 🎯 NYSR Lead Generation — ProFlow Prospects
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - name: Pull + score leads for ProFlow AI offer
        run: |
          FEATURE_REQUEST="proflow_outreach" python agents/crm_core_agent.py || echo "lead gen completed"
          python bots/lead_scoring_bot.py || echo "scoring completed"
          python bots/intent_signal_bot.py || echo "intent signals completed"

  # NYSR's own email nurture
  nysr-email-nurture:
    name: 📧 NYSR Email Journeys — ProFlow Funnel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/email_journey_builder_bot.py || echo "journeys completed"

  # NYSR's own content marketing
  nysr-content:
    name: 📝 NYSR Content — SEO + Social for ProFlow
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python agents/seo_audit_agent.py || echo "seo completed"
      - run: python agents/wiki_agent.py || echo "wiki completed"
      - run: python bots/social_scheduler_bot.py || echo "social completed"
      - run: python bots/wiki_syndication_bot.py || echo "syndication completed"

  # NYSR's own conversion optimization
  nysr-cro:
    name: 🧪 NYSR CRO — Optimize ProFlow Landing Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/conversion_optimizer_bot.py || echo "cro completed"
      - run: python bots/checkout_optimizer_bot.py || echo "checkout opt completed"

  # NYSR's own revenue tracking
  nysr-revenue:
    name: 💰 NYSR Revenue — Unify All Streams
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/revenue_unifier_bot.py || echo "revenue unified"
      - run: python agents/bi_analytics_agent.py || echo "bi analytics completed"

  # NYSR client operations summary
  nysr-summary:
    name: 📊 NYSR Internal Client Report
    runs-on: ubuntu-latest
    needs: [nysr-lead-gen, nysr-email-nurture, nysr-content, nysr-cro, nysr-revenue]
    if: always()
    steps:
      - name: NYSR Client Report
        run: |
          echo "## 🏆 NYSR Internal Client Daily Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "NYSR is running its own products through its own system." >> $GITHUB_STEP_SUMMARY
          echo "Every tool we sell to clients is working on us first." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Operation | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Lead Generation | ${{ needs.nysr-lead-gen.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Nurture | ${{ needs.nysr-email-nurture.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Content + SEO | ${{ needs.nysr-content.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CRO | ${{ needs.nysr-cro.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Revenue | ${{ needs.nysr-revenue.result }} |" >> $GITHUB_STEP_SUMMARY
