name: "💳 Set Payment Credentials in Netlify"

on:
  workflow_dispatch:

jobs:
  set-payment-env:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Push Stripe + TT credentials to Netlify env
        env:
          NETLIFY_AUTH_TOKEN:    ${{ secrets.NETLIFY_AUTH_TOKEN }}
          STRIPE_SECRET_KEY:     ${{ secrets.STRIPE_SECRET_KEY }}
          TICKET_TAILOR_API_KEY: ${{ secrets.TICKET_TAILOR_API_KEY }}
          SHOPIFY_ACCESS_TOKEN:  ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          GUMROAD_ACCESS_TOKEN:  ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          python3 - << 'SCRIPT'
          import os, json, urllib.request, urllib.error

          TOKEN   = os.environ.get('NETLIFY_AUTH_TOKEN','')
          SITE_ID = '8ef722e1-4110-42af-8ddb-ff6c2ce1745e'
          HEADERS = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}

          VARS = {
            'STRIPE_SECRET_KEY':     os.environ.get('STRIPE_SECRET_KEY',''),
            'TICKET_TAILOR_API_KEY': os.environ.get('TICKET_TAILOR_API_KEY',''),
            'SHOPIFY_ACCESS_TOKEN':  os.environ.get('SHOPIFY_ACCESS_TOKEN',''),
            'GUMROAD_ACCESS_TOKEN':  os.environ.get('GUMROAD_ACCESS_TOKEN',''),
          }

          ok = 0
          for key, val in VARS.items():
            if not val: print(f'  SKIP (empty): {key}'); continue
            body = json.dumps([{"key": key, "scopes": ["functions","builds"], "values": [{"context": "production", "value": val}]}]).encode()
            req = urllib.request.Request(f'https://api.netlify.com/api/v1/sites/{SITE_ID}/env', data=body, method='POST', headers=HEADERS)
            try:
              with urllib.request.urlopen(req, timeout=15) as r:
                print(f'  SET: {key}'); ok += 1
            except urllib.error.HTTPError as e:
              if e.code == 422:
                body2 = json.dumps({"scopes": ["functions","builds"], "values": [{"context": "production", "value": val}]}).encode()
                req2 = urllib.request.Request(f'https://api.netlify.com/api/v1/sites/{SITE_ID}/env/{key}', data=body2, method='PUT', headers=HEADERS)
                with urllib.request.urlopen(req2, timeout=15) as r2:
                  print(f'  UPDATE: {key}'); ok += 1
              else: print(f'  ERR {key}: {e.code}')
          print(f'Done: {ok}/{len(VARS)} payment vars set in Netlify')
          SCRIPT

      - name: Register Stripe webhook endpoint
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          python3 - << 'SCRIPT'
          import os, urllib.request, urllib.parse, json

          STRIPE_SK   = os.environ.get('STRIPE_SECRET_KEY','')
          WEBHOOK_URL = 'https://nyspotlightreport.com/.netlify/functions/stripe-webhook'
          EVENTS      = ['checkout.session.completed','payment_intent.succeeded','customer.subscription.created','customer.subscription.updated','invoice.payment_succeeded']

          if not STRIPE_SK: print('No Stripe key'); exit(0)

          # List existing webhooks first
          req = urllib.request.Request('https://api.stripe.com/v1/webhook_endpoints?limit=10',
            headers={'Authorization': f'Bearer {STRIPE_SK}'})
          try:
            with urllib.request.urlopen(req, timeout=15) as r:
              webhooks = json.loads(r.read()).get('data', [])
              for wh in webhooks:
                if wh.get('url') == WEBHOOK_URL:
                  print(f'Webhook already registered: {wh["id"]}')
                  exit(0)
          except Exception as e: print(f'List error: {e}')

          # Register new webhook
          data = urllib.parse.urlencode({
            'url': WEBHOOK_URL,
            'enabled_events[]': EVENTS[0],
          })
          for e in EVENTS[1:]:
            data += f'&enabled_events[]={e}'

          req2 = urllib.request.Request('https://api.stripe.com/v1/webhook_endpoints',
            data=data.encode(),
            method='POST',
            headers={'Authorization': f'Bearer {STRIPE_SK}', 'Content-Type': 'application/x-www-form-urlencoded'})
          try:
            with urllib.request.urlopen(req2, timeout=15) as r2:
              result = json.loads(r2.read())
              print(f'Stripe webhook registered: {result.get("id")}')
              print(f'Webhook secret: {result.get("secret","")[:10]}... (save this as STRIPE_WEBHOOK_SECRET)')
              # Save webhook secret to output
              with open('/tmp/webhook_secret.txt', 'w') as f:
                f.write(result.get('secret',''))
          except urllib.error.HTTPError as e:
            body = e.read().decode()
            print(f'Webhook registration: {e.code} — {body[:200]}')
          SCRIPT

      - name: Trigger site deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          curl -s -X POST "https://api.netlify.com/api/v1/sites/8ef722e1-4110-42af-8ddb-ff6c2ce1745e/deploys" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" -d '{}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy:', d.get('id','?'))"
