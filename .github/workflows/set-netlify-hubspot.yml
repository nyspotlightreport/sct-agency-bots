name: Add HubSpot to Netlify Env

on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set HUBSPOT_API_KEY in Netlify
        run: |
          curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "HUBSPOT_API_KEY",
              "scopes": ["functions"],
              "values": [{"context": "all", "value": "${{ secrets.HUBSPOT_API_KEY }}"}]
            }' && echo "✅ HUBSPOT_API_KEY set"
      
      - name: Set NEWSAPI_KEY in Netlify
        run: |
          curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/env" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "key": "NEWSAPI_KEY",
              "scopes": ["functions"],
              "values": [{"context": "all", "value": "${{ secrets.NEWSAPI_KEY }}"}]
            }' && echo "✅ NEWSAPI_KEY set"
            
      - name: Trigger redeploy
        run: |
          curl -s -X POST "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/builds" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" && echo "✅ Redeploy triggered"
