name: "Affiliate Engine"
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'
env:
  SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
  SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
  SMTP_USER:          ${{ secrets.SMTP_USER }}
  GMAIL_APP_PASS:     ${{ secrets.GMAIL_APP_PASS }}
  AFFILIATE_EMAIL:    ${{ secrets.AFFILIATE_EMAIL }}
  PUSHOVER_API_KEY:   ${{ secrets.PUSHOVER_API_KEY }}
  PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
  TWOCAPTCHA_LOGIN:   ${{ secrets.TWOCAPTCHA_LOGIN }}
  TWOCAPTCHA_PASSWORD: ${{ secrets.TWOCAPTCHA_PASSWORD }}
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
jobs:
  apply-all:
    name: "Apply to 23 Affiliate Programs"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests -q
      - run: python bots/affiliate_engine.py || echo "done"
