name: YouTube Shorts Factory
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - name: Clone live repo for article data
        run: git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/nyspotlightreport/NY-Spotlight-Report-good.git ../NY-Spotlight-Report-good
      - run: python3 agents/youtube_shorts_factory.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_BATCH_SIZE: '3'
      - name: Save scripts
        run: |
          git config user.name "YouTube Bot"
          git config user.email "bot@nyspotlightreport.com"
          git add data/youtube/ || true
          git diff --cached --quiet || (git commit -m "youtube: generate shorts $(date +%Y-%m-%d)" && git push)
