name: Inject Secrets to DO Server
on:
  workflow_dispatch:
jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Inject Anthropic key to server
        run: |
          curl -s -X POST http://204.48.29.16:8080/ \
            -H "Content-Type: application/json" \
            -d '{"token":"nysr-general-command-2026-sc-thomas","cmd":"echo ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} >> /opt/nysr/config/.env && echo OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} >> /opt/nysr/config/.env && echo PUSHOVER_API_KEY=${{ secrets.PUSHOVER_API_KEY }} >> /opt/nysr/config/.env && echo PUSHOVER_USER=${{ secrets.PUSHOVER_USER }} >> /opt/nysr/config/.env && echo APOLLO_API_KEY=${{ secrets.APOLLO_API_KEY }} >> /opt/nysr/config/.env && echo STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} >> /opt/nysr/config/.env && echo TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }} >> /opt/nysr/config/.env && echo TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }} >> /opt/nysr/config/.env && sort -u /opt/nysr/config/.env -o /opt/nysr/config/.env && echo ENV_INJECTED"}'
