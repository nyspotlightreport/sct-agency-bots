name: 🎰 Sweepstakes Hunter (Hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  hunt-and-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-flight check
        run: |
          echo "Workflow: ${{ github.workflow }}"
          [ -n "${{ secrets.SUPABASE_URL }}" ] && echo "SUPABASE: SET" || echo "SUPABASE: MISSING"
          [ -n "${{ secrets.RESEND_API_KEY }}" ] && echo "RESEND: SET" || echo "RESEND: MISSING"
          [ -n "${{ secrets.OPENAI_API_KEY }}" ] && echo "OPENAI: SET" || echo "OPENAI: MISSING"
        continue-on-error: true
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests feedparser beautifulsoup4 lxml

      - name: Restore DB cache
        uses: actions/cache@v3
        with:
          path: data/sweepstakes.db
          key: sweeps-db-${{ github.run_number }}
          restore-keys: sweeps-db-

      - name: 🎰 Hunt sweepstakes + send digest
        env:
          GMAIL_USER:      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:  ${{ secrets.GMAIL_APP_PASS }}
          CHAIRMAN_EMAIL:  ${{ secrets.CHAIRMAN_EMAIL }}
        run: python bots/sweepstakes_digest_bot.py

      - name: Save DB
        uses: actions/cache@v3
        with:
          path: data/sweepstakes.db
          key: sweeps-db-${{ github.run_number }}

      - name: Commit digest HTML
        run: |
          git config user.name "NYSR Bot"
          git config user.email "nyspotlightreport@gmail.com"
          git add data/ || true
          git diff --staged --quiet || git commit -m "🎰 Sweeps digest $(date +%Y-%m-%d-%H%M)" && git push || true
