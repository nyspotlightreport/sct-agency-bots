[build]
  publish = "site"
  functions = "netlify/functions"
  command = "npm install --prefix . 2>/dev/null || true"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[redirects]]
  from = "/api/linkedin-callback"
  to   = "/.netlify/functions/linkedin-callback"
  status = 200

[[redirects]]
  from = "/api/facebook-callback"
  to   = "/.netlify/functions/facebook-callback"
  status = 200

[[redirects]]
  from = "/api/save-secret"
  to   = "/.netlify/functions/save-secret"
  status = 200

[[redirects]]
  from = "/api/news"
  to   = "/.netlify/functions/api-news"
  status = 200

[[redirects]]
  from = "/api/stocks"
  to   = "/.netlify/functions/stocks"
  status = 200
