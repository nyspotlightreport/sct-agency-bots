  </defs>
  <rect width="3000" height="3000" fill="url(#msky)"/>
  <!-- Stars -->
  <circle cx="300" cy="200" r="3" fill="white" opacity="0.8"/>
  <circle cx="700" cy="350" r="2" fill="white" opacity="0.6"/>
  <circle cx="1200" cy="150" r="3" fill="white" opacity="0.9"/>
