<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <rect width="3000" height="3000" fill="#f5f0e8"/>
  <text x="1500" y="500" font-family="Georgia" font-size="120" fill="#2d5a27" text-anchor="middle" font-weight="bold">PLANT</text>
  <text x="1500" y="700" font-family="Georgia" font-size="120" fill="#2d5a27" text-anchor="middle" font-weight="bold">PARENT</text>
  <!-- Pot -->
  <ellipse cx="1500" cy="1800" rx="280" ry="60" fill="#8B4513"/>
  <rect x="1220" y="1800" width="560" height="400" rx="20" fill="#A0522D"/>
  <ellipse cx="1500" cy="2200" rx="300" ry="50" fill="#8B4513"/>
  <!-- Plant stem + leaves -->
  <line x1="1500" y1="1780" x2="1500" y2="1200" stroke="#2d5a27" stroke-width="20"/>
  <ellipse cx="1350" cy="1450" rx="150" ry="80" fill="#3a7a33" transform="rotate(-30,1350,1450)"/>
  <ellipse cx="1650" cy="1350" rx="150" ry="80" fill="#4a8a43" transform="rotate(30,1650,1350)"/>
  <ellipse cx="1500" cy="1200" rx="120" ry="60" fill="#5a9a53"/>
  <text x="1500" y="2600" font-family="Georgia" font-size="75" fill="#5a7a50" text-anchor="middle" font-style="italic">my plants need me more</text>
  <text x="1500" y="2720" font-family="Georgia" font-size="65" fill="#5a7a50" text-anchor="middle" font-style="italic">than people do</text>
</svg>