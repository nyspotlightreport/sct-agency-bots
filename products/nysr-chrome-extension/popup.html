<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYSR AI Companion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px;
    min-height: 500px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0A0F1A;
    color: #E2E8F0;
  }
  .header {
    background: linear-gradient(135deg, #0D1B2A, #1a2d42);
    border-bottom: 1px solid rgba(201,168,76,.2);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo { color: #C9A84C; font-weight: 800; font-size: 16px; }
  .logo span { color: #E2E8F0; font-weight: 300; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22D3A0; margin-left: auto; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  
  .tabs { display: flex; border-bottom: 1px solid #1a2d42; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 600; cursor: pointer; color: #475569; transition: all .2s; }
  .tab.active { color: #C9A84C; border-bottom: 2px solid #C9A84C; }
  
  .panel { padding: 14px; display: none; }
  .panel.active { display: block; }
  
  .textarea {
    width: 100%;
    background: #111827;
    border: 1px solid #1a2d42;
    border-radius: 8px;
    padding: 10px;
    color: #E2E8F0;
    font-size: 13px;
    resize: vertical;
    min-height: 80px;
    outline: none;
    font-family: inherit;
    transition: border .15s;
  }
  .textarea:focus { border-color: #C9A84C; }
  .textarea::placeholder { color: #374151; }
  
  .btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    margin-top: 8px;
    transition: all .2s;
  }
  .btn-primary { background: #C9A84C; color: #0A0F1A; }
  .btn-primary:hover { background: #DFC06A; }
  .btn-outline { background: transparent; color: #C9A84C; border: 1px solid rgba(201,168,76,.3); }
  .btn-outline:hover { background: rgba(201,168,76,.08); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  
  .output {
    margin-top: 10px;
    background: #111827;
    border: 1px solid #1a2d42;
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
    line-height: 1.6;
    color: #94A3B8;
    min-height: 60px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
  }
  .output.visible { display: block; }
  
  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .quick-btn {
    padding: 8px;
    background: #111827;
    border: 1px solid #1a2d42;
    border-radius: 8px;
    color: #94A3B8;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .quick-btn:hover { border-color: #C9A84C; color: #C9A84C; background: rgba(201,168,76,.05); }
  .quick-btn .icon { font-size: 18px; display: block; margin-bottom: 4px; }
  
  .loading { display: inline-block; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a2d42; }
  .settings-label { font-size: 12px; color: #94A3B8; }
  .settings-input { background: #111827; border: 1px solid #1a2d42; border-radius: 6px; padding: 6px 10px; color: #E2E8F0; font-size: 12px; width: 200px; outline: none; }
  
  .toast { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: #111827; border: 1px solid rgba(201,168,76,.3); color: #C9A84C; padding: 8px 16px; border-radius: 20px; font-size: 11px; display: none; }
  .toast.show { display: block; animation: fadeIn .2s; }
  @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>
<div class="header">
  <span class="logo">NYSR <span>AI Companion</span></span>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('compose')">✍️ Compose</div>
  <div class="tab" onclick="switchTab('analyze')">🔍 Analyze</div>
  <div class="tab" onclick="switchTab('actions')">⚡ Actions</div>
  <div class="tab" onclick="switchTab('settings')">⚙️ Settings</div>
</div>

<div class="panel active" id="panel-compose">
  <textarea class="textarea" id="composePrompt" placeholder="What do you want to write? (e.g. LinkedIn post about AI automation, cold email for ProFlow AI, SEO blog intro...)"></textarea>
  <select class="textarea" id="toneSelect" style="min-height:auto;margin-top:6px;">
    <option value="professional">Professional</option>
    <option value="conversational">Conversational</option>
    <option value="persuasive">Persuasive / Sales</option>
    <option value="authoritative">Authoritative / Expert</option>
  </select>
  <button class="btn btn-primary" id="composeBtn" onclick="compose()">Generate Content</button>
  <div class="output" id="composeOutput"></div>
</div>

<div class="panel" id="panel-analyze">
  <button class="btn btn-outline" onclick="analyzePage()">🔍 Analyze Current Page</button>
  <button class="btn btn-outline" onclick="summarizePage()" style="margin-top:6px;">📋 Summarize Page</button>
  <button class="btn btn-outline" onclick="extractLeads()" style="margin-top:6px;">🎯 Extract Lead Info</button>
  <div class="output" id="analyzeOutput"></div>
</div>

<div class="panel" id="panel-actions">
  <div class="quick-actions">
    <div class="quick-btn" onclick="quickAction('linkedin_post')"><span class="icon">💼</span>LinkedIn Post</div>
    <div class="quick-btn" onclick="quickAction('tweet')"><span class="icon">🐦</span>Tweet Thread</div>
    <div class="quick-btn" onclick="quickAction('cold_email')"><span class="icon">📧</span>Cold Email</div>
    <div class="quick-btn" onclick="quickAction('blog_intro')"><span class="icon">📝</span>Blog Intro</div>
    <div class="quick-btn" onclick="quickAction('reply')"><span class="icon">💬</span>Write Reply</div>
    <div class="quick-btn" onclick="quickAction('seo_meta')"><span class="icon">🎯</span>SEO Meta</div>
  </div>
  <div class="output" id="actionsOutput"></div>
</div>

<div class="panel" id="panel-settings">
  <div class="settings-row">
    <span class="settings-label">API Key</span>
    <input class="settings-input" type="password" id="apiKeyInput" placeholder="sk-ant-..." />
  </div>
  <div class="settings-row">
    <span class="settings-label">Default Tone</span>
    <select class="settings-input" id="defaultTone">
      <option>Professional</option>
      <option>Conversational</option>
      <option>Persuasive</option>
    </select>
  </div>
  <div class="settings-row">
    <span class="settings-label">Brand Voice</span>
    <select class="settings-input" id="brandVoice">
      <option>SC Thomas (NY Spotlight)</option>
      <option>Generic Business</option>
      <option>Custom</option>
    </select>
  </div>
  <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:12px;">Save Settings</button>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
