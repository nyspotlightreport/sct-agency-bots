<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout Cancelled — NYSR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#060a0f;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{max-width:480px;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:48px;text-align:center}
.icon{font-size:52px;margin-bottom:16px}
h1{font-size:24px;font-weight:700;color:#f1f5f9;margin-bottom:8px}
.sub{font-size:15px;color:#64748b;margin-bottom:28px}
.back-btn{display:inline-block;background:#C9A84C;color:#060a0f;padding:12px 28px;border-radius:9px;font-weight:700;text-decoration:none;font-size:15px}
</style>
</head>
<body>
<div class="card">
  <div class="icon">↩️</div>
  <h1>No worries</h1>
  <p class="sub">Your checkout was cancelled. Nothing was charged. Come back whenever you're ready.</p>
  <a href="/store/" class="back-btn">Back to Store →</a>
</div>
</body>
</html>
