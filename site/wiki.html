<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NYSR Agency knowledge base — AI automation guides, SOPs, bot catalog, tech architecture, sales playbooks. Free access.">
<meta name="keywords" content="AI automation documentation, agency knowledge base, NY Spotlight Report, ProFlow AI guides">
<meta property="og:title" content="Knowledge Base — NYSR Agency">
<meta property="og:description" content="Everything you need to know about NYSR AI automation. Free guides, SOPs, and playbooks.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nyspotlightreport.com/wiki/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://nyspotlightreport.com/wiki/">
<title>Wiki — NYSR Agency</title>
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#7c3aed;--accent2:#06b6d4;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;flex-shrink:0}
  .nav a{color:var(--muted);text-decoration:none;font-size:.875rem}.nav a:hover{color:var(--text)}
  .logo{color:var(--accent);font-weight:700;font-size:1.1rem;margin-right:auto}
  .layout{display:flex;flex:1;overflow:hidden}
  .sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:1.5rem 1rem;flex-shrink:0}
  .search-box{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.6rem .9rem;border-radius:8px;font-size:.875rem;margin-bottom:1.5rem;outline:none}
  .search-box:focus{border-color:var(--accent)}
  .cat-section{margin-bottom:1.5rem}
  .cat-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.5rem;font-weight:600}
  .cat-link{display:block;padding:.45rem .75rem;border-radius:6px;color:var(--muted);font-size:.85rem;text-decoration:none;cursor:pointer;transition:all .15s}
  .cat-link:hover,.cat-link.active{background:var(--border);color:var(--text)}
  .cat-link.active{border-left:2px solid var(--accent);padding-left:.625rem}
  .content{flex:1;overflow-y:auto;padding:2rem 2.5rem;max-width:860px}
  .page-header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
  h1{font-size:1.75rem;font-weight:700;margin-bottom:.5rem}
  .page-meta{color:var(--muted);font-size:.8rem;display:flex;gap:1rem;align-items:center}
  .tag{background:var(--border);color:var(--muted);padding:.15rem .5rem;border-radius:4px;font-size:.7rem}
  .wiki-body{line-height:1.8;font-size:.9375rem}
  .wiki-body h2{font-size:1.2rem;font-weight:600;margin:1.75rem 0 .75rem;color:var(--text)}
  .wiki-body h3{font-size:1rem;font-weight:600;margin:1.25rem 0 .5rem;color:var(--accent2)}
  .wiki-body p{margin-bottom:1rem;color:#cbd5e1}
  .wiki-body ul,.wiki-body ol{margin:.5rem 0 1rem 1.5rem;color:#cbd5e1}
  .wiki-body li{margin-bottom:.35rem}
  .wiki-body code{background:var(--border);padding:.15rem .4rem;border-radius:4px;font-size:.85em;font-family:'Fira Code',monospace;color:var(--accent2)}
  .wiki-body pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;overflow-x:auto;margin:1rem 0}
  .wiki-body pre code{background:none;padding:0}
  .wiki-body table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.875rem}
  .wiki-body th{background:var(--surface);border:1px solid var(--border);padding:.6rem 1rem;text-align:left;color:var(--muted)}
  .wiki-body td{border:1px solid var(--border);padding:.6rem 1rem;color:#cbd5e1}
  .wiki-body blockquote{border-left:3px solid var(--accent);padding-left:1rem;margin:1rem 0;color:var(--muted);font-style:italic}
  .helpful{display:flex;align-items:center;gap:1rem;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
  .helpful-label{font-size:.875rem;color:var(--muted)}
  .helpful-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem 1.25rem;border-radius:8px;cursor:pointer;font-size:.875rem;transition:all .15s}
  .helpful-btn:hover{border-color:var(--accent);color:var(--accent)}
  .loading{color:var(--muted);font-size:.875rem;padding:2rem;text-align:center}
  .empty-state{text-align:center;padding:4rem 2rem}
  .empty-state h2{font-size:1.25rem;margin-bottom:.5rem}
  .empty-state p{color:var(--muted);font-size:.875rem}
  .page-list{display:grid;gap:.75rem}
  .page-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;cursor:pointer;transition:border-color .15s}
  .page-card:hover{border-color:var(--accent)}
  .page-card-title{font-weight:600;margin-bottom:.35rem}
  .page-card-excerpt{color:var(--muted);font-size:.8rem;line-height:1.5}
  @media(max-width:768px){.sidebar{display:none}.content{padding:1.5rem}}
</style>
</head>
<body>
<nav class="nav">
  <span class="logo">⚡ NYSR Agency</span>
  <a href="/">Home</a><a href="/command/">Command</a><a href="/projects/">Projects</a>
  <a href="/sales/">Sales</a><a href="/store/">Store</a><a href="/dev/">Dev</a>
</nav>
<div class="layout">
  <aside class="sidebar">
    <input class="search-box" placeholder="🔍 Search wiki…" id="search-input" oninput="searchWiki(this.value)">
    <div id="sidebar-cats"><div class="loading">Loading…</div></div>
  </aside>
  <main class="content">
    <div id="wiki-content">
      <div class="page-header">
        <h1>📚 NYSR Knowledge Base</h1>
        <p style="color:var(--muted);margin-top:.5rem">Phase 2 · AI-generated, always up to date · Closes Confluence gap</p>
      </div>
      <div id="page-list" class="page-list"><div class="loading">Loading wiki pages…</div></div>
    </div>
  </main>
</div>
<script>
const SUPA_URL = 'https://sazuogglxukumnvhvkms.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhenVvZ2dseHVrdW1udmh2a21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTcxNTMsImV4cCI6MjA4OTY5MzE1M30.FQubC3llmkDgRjx28X1LrcEg1h5kCtFHbDxvmpYPYvI';

let allPages = [];

async function supa(table, query='') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${query}`, {
    headers:{apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`}});
  return r.ok ? r.json() : [];
}

function md2html(md) {
  if (!md) return '<p>No content yet.</p>';
  return md
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hul])/gm,'<p>')
    .replace(/(?<![>])\n(?![<])/g,' ');
}

async function loadSidebar() {
  const cats = await supa('wiki_categories','?select=*&order=order_index.asc');
  const pages = await supa('wiki_pages','?select=title,slug,category_id&status=eq.published');
  allPages = await supa('wiki_pages','?select=*&status=eq.published&order=created_at.desc');
  const sidebar = document.getElementById('sidebar-cats');
  sidebar.innerHTML = cats.map(c => {
    const catPages = pages.filter(p => p.category_id === c.id);
    return `<div class="cat-section">
      <div class="cat-title">${c.icon} ${c.name}</div>
      ${catPages.map(p=>`<a class="cat-link" onclick="loadPage('${p.slug}')">${p.title}</a>`).join('')}
      ${catPages.length===0?'<span style="color:var(--muted);font-size:.75rem;padding:.25rem .75rem;display:block">Coming soon…</span>':''}
    </div>`;
  }).join('');
  loadPageList();
}

function loadPageList() {
  const list = document.getElementById('page-list');
  if (!allPages.length) {
    list.innerHTML = `<div class="empty-state">
      <h2>Wiki is being generated…</h2>
      <p>The wiki agent runs daily and auto-generates docs.<br>Check back in a few minutes or trigger the Phase 2 workflow.</p>
    </div>`;
    return;
  }
  list.innerHTML = allPages.slice(0,12).map(p=>`
    <div class="page-card" onclick="loadPage('${p.slug}')">
      <div class="page-card-title">${p.title}</div>
      <div class="page-card-excerpt">${(p.content||'').substring(0,120).replace(/[#*`]/g,'')}…</div>
    </div>`).join('');
}

async function loadPage(slug) {
  const pages = await supa('wiki_pages',`?slug=eq.${slug}&select=*&limit=1`);
  if (!pages || !pages.length) return;
  const p = pages[0];
  // Increment views
  fetch(`${SUPA_URL}/rest/v1/wiki_pages?id=eq.${p.id}`, {
    method:'PATCH',
    headers:{apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify({views:(p.views||0)+1})
  });
  document.querySelectorAll('.cat-link').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll(`.cat-link`).forEach(el=>{if(el.getAttribute('onclick')?.includes(slug))el.classList.add('active')});
  document.getElementById('wiki-content').innerHTML = `
    <div class="page-header">
      <h1>${p.title}</h1>
      <div class="page-meta">
        <span>📝 ${p.author}</span>
        <span>👁️ ${p.views||0} views</span>
        <span>v${p.version||1}</span>
        ${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
    <div class="wiki-body">${md2html(p.content)}</div>
    <div class="helpful">
      <span class="helpful-label">Was this helpful?</span>
      <button class="helpful-btn" onclick="markHelpful('${p.id}','yes')">👍 Yes (${p.helpful_yes||0})</button>
      <button class="helpful-btn" onclick="markHelpful('${p.id}','no')">👎 No (${p.helpful_no||0})</button>
      <a href="/wiki/" onclick="history.back();return false" style="color:var(--muted);font-size:.8rem;margin-left:auto;text-decoration:none">← Back</a>
    </div>`;
}

async function markHelpful(id, vote) {
  const pages = await supa('wiki_pages',`?id=eq.${id}&select=helpful_yes,helpful_no&limit=1`);
  if (!pages.length) return;
  const p = pages[0];
  const field = vote==='yes'?{helpful_yes:(p.helpful_yes||0)+1}:{helpful_no:(p.helpful_no||0)+1};
  await fetch(`${SUPA_URL}/rest/v1/wiki_pages?id=eq.${id}`, {
    method:'PATCH',
    headers:{apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify(field)
  });
  alert('Thanks for your feedback!');
}

function searchWiki(q) {
  if (!q) { loadPageList(); return; }
  const results = allPages.filter(p =>
    p.title.toLowerCase().includes(q.toLowerCase()) ||
    (p.content||'').toLowerCase().includes(q.toLowerCase())
  );
  const list = document.getElementById('page-list');
  if (!results.length) { list.innerHTML='<div class="loading">No results found</div>'; return; }
  list.innerHTML = `<div class="page-header"><h1>Search: "${q}"</h1><p style="color:var(--muted);font-size:.8rem">${results.length} result(s)</p></div>` +
    results.map(p=>`<div class="page-card" onclick="loadPage('${p.slug}')">
      <div class="page-card-title">${p.title}</div>
      <div class="page-card-excerpt">${(p.content||'').substring(0,120).replace(/[#*`]/g,'')}…</div>
    </div>`).join('');
}

loadSidebar();
</script>
