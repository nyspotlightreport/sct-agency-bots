<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets — NYSR ITSM</title>
<meta name="robots" content="noindex">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#7c3aed;--accent2:#06b6d4;--green:#10b981;--yellow:#f59e0b;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
  .nav{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;gap:1rem}
  .logo{color:var(--accent);font-weight:700;font-size:1.1rem;margin-right:auto}
  .nav a{color:var(--muted);text-decoration:none;font-size:.875rem}.nav a:hover{color:var(--text)}
  .main{padding:2rem;max-width:1400px;margin:0 auto}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
  h1{font-size:1.75rem;font-weight:700}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;margin-bottom:2rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center}
  .stat-num{font-size:2rem;font-weight:700}
  .stat-label{color:var(--muted);font-size:.75rem;margin-top:.25rem}
  .filters{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
  .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.4rem 1rem;border-radius:99px;font-size:.8rem;cursor:pointer}
  .filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .ticket-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .table-header{display:grid;grid-template-columns:60px 1fr 100px 90px 100px 120px 110px;padding:.75rem 1.25rem;background:var(--bg);border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .ticket-row{display:grid;grid-template-columns:60px 1fr 100px 90px 100px 120px 110px;padding:.875rem 1.25rem;border-bottom:1px solid var(--border);font-size:.875rem;align-items:center;transition:background .1s;cursor:pointer}
  .ticket-row:last-child{border-bottom:none}
  .ticket-row:hover{background:var(--border)}
  .t-num{color:var(--muted);font-size:.8rem;font-weight:500}
  .t-title{font-weight:500}
  .t-sub{color:var(--muted);font-size:.75rem}
  .badge{padding:.2rem .6rem;border-radius:6px;font-size:.7rem;font-weight:600}
  .b-open{background:#7c3aed20;color:var(--accent)}
  .b-in_progress{background:#06b6d420;color:var(--accent2)}
  .b-pending{background:#f59e0b20;color:var(--yellow)}
  .b-resolved{background:#10b98120;color:var(--green)}
  .b-closed{background:var(--border);color:var(--muted)}
  .p-critical{color:var(--red);font-weight:700}
  .p-high{color:var(--yellow)}
  .p-medium{color:var(--accent2)}
  .p-low{color:var(--muted)}
  .sla-ok{color:var(--green);font-size:.75rem}
  .sla-warn{color:var(--yellow);font-size:.75rem}
  .sla-breach{color:var(--red);font-size:.75rem;font-weight:600}
  .btn{background:var(--accent);color:#fff;border:none;padding:.6rem 1.25rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer}
  .ticket-detail{display:none;position:fixed;top:0;right:0;width:480px;height:100vh;background:var(--surface);border-left:1px solid var(--border);padding:1.5rem;overflow-y:auto;z-index:100}
  .detail-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.25rem;cursor:pointer}
  .detail-title{font-size:1.1rem;font-weight:700;margin-bottom:1rem;padding-right:2rem}
  .detail-meta{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
  .msg-thread{margin-top:1.5rem}
  .msg{background:var(--bg);border-radius:10px;padding:1rem;margin-bottom:.75rem;font-size:.875rem}
  .msg.agent{background:#7c3aed10;border-left:3px solid var(--accent)}
  .msg.ai{background:#06b6d410;border-left:3px solid var(--accent2)}
  .msg-author{font-size:.75rem;color:var(--muted);margin-bottom:.35rem}
  .clients-section{margin-top:2.5rem}
  .client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:1rem}
  .client-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
  .client-name{font-weight:600;margin-bottom:.25rem}
  .client-meta{font-size:.8rem;color:var(--muted)}
  .client-mrr{font-size:1rem;font-weight:700;color:var(--green);margin-top:.5rem}
  .loading{color:var(--muted);font-size:.875rem;text-align:center;padding:2rem}
  @media(max-width:1024px){.table-header,.ticket-row{grid-template-columns:60px 1fr 90px 90px 90px}.hide-sm{display:none}}
</style>
</head>
<body>
<nav class="nav">
  <span class="logo">⚡ NYSR Agency</span>
  <a href="/command/">Command</a><a href="/portal/">Client Portal</a>
  <a href="/projects/">Projects</a><a href="/sales/">Sales</a>
</nav>
<main class="main">
  <div class="header">
    <div>
      <h1>🎫 ITSM — Ticket Center</h1>
      <p style="color:var(--muted);font-size:.875rem;margin-top:.25rem">Phase 4 · ServiceNow replacement · $997–1,997/mo enterprise</p>
    </div>
    <button class="btn" onclick="refreshData()">🔄 Refresh</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">—</div><div class="stat-label">Total Tickets</div></div>
    <div class="stat"><div class="stat-num" id="s-open" style="color:var(--accent)">—</div><div class="stat-label">Open</div></div>
    <div class="stat"><div class="stat-num" id="s-breach" style="color:var(--red)">—</div><div class="stat-label">SLA Breached</div></div>
    <div class="stat"><div class="stat-num" id="s-clients" style="color:var(--green)">—</div><div class="stat-label">Active Clients</div></div>
    <div class="stat"><div class="stat-num" id="s-mrr" style="color:var(--yellow)">—</div><div class="stat-label">Portal MRR</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterTickets('all',this)">All</button>
    <button class="filter-btn" onclick="filterTickets('open',this)">Open</button>
    <button class="filter-btn" onclick="filterTickets('in_progress',this)">In Progress</button>
    <button class="filter-btn" onclick="filterTickets('critical',this)">🚨 Critical</button>
    <button class="filter-btn" onclick="filterTickets('sla_breach',this)">⚠️ SLA Breach</button>
    <button class="filter-btn" onclick="filterTickets('resolved',this)">Resolved</button>
  </div>

  <div class="ticket-table">
    <div class="table-header">
      <span>#</span><span>Title</span><span>Status</span><span>Priority</span>
      <span class="hide-sm">Category</span><span class="hide-sm">SLA</span><span>Created</span>
    </div>
    <div id="tickets-tbody"><div class="loading">Loading tickets…</div></div>
  </div>

  <div class="clients-section">
    <div style="font-size:1.1rem;font-weight:600;margin-bottom:.5rem">👥 Portal Clients</div>
    <div id="clients-grid" class="client-grid"><div class="loading">Loading clients…</div></div>
  </div>
</main>

<!-- Ticket Detail Panel -->
<div class="ticket-detail" id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

<script>
const SUPA_URL = 'https://sazuogglxukumnvhvkms.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhenVvZ2dseHVrdW1udmh2a21zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTcxNTMsImV4cCI6MjA4OTY5MzE1M30.FQubC3llmkDgRjx28X1LrcEg1h5kCtFHbDxvmpYPYvI';

let allTickets = [];

async function supa(table, query='') {
  const r = await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,
    {headers:{apikey:SUPA_KEY,Authorization:`Bearer ${SUPA_KEY}`}});
  return r.ok ? r.json() : [];
}

function slaStatus(t) {
  if (t.sla_breached) return '<span class="sla-breach">⚠️ BREACHED</span>';
  if (!t.due_at) return '<span class="sla-ok">—</span>';
  const diff = new Date(t.due_at) - new Date();
  if (diff < 0) return '<span class="sla-breach">OVERDUE</span>';
  if (diff < 2*3600000) return `<span class="sla-warn">${Math.floor(diff/3600000)}h left</span>`;
  return `<span class="sla-ok">${Math.floor(diff/3600000)}h left</span>`;
}

function renderTickets(tickets) {
  const tbody = document.getElementById('tickets-tbody');
  if (!tickets.length) {tbody.innerHTML='<div class="loading">No tickets found</div>';return;}
  tbody.innerHTML = tickets.map(t=>`
    <div class="ticket-row" onclick="openDetail('${t.id}')">
      <span class="t-num">#${t.ticket_number||'—'}</span>
      <div><div class="t-title">${t.title.substring(0,55)}${t.title.length>55?'…':''}</div></div>
      <span><span class="badge b-${t.status}">${t.status.replace('_',' ')}</span></span>
      <span class="p-${t.priority}">${t.priority}</span>
      <span class="hide-sm" style="font-size:.8rem;color:var(--muted)">${t.category||'—'}</span>
      <span class="hide-sm">${slaStatus(t)}</span>
      <span style="font-size:.75rem;color:var(--muted)">${(t.created_at||'').substring(0,10)}</span>
    </div>`).join('');
}

async function openDetail(id) {
  const ticket = allTickets.find(t=>t.id===id);
  if (!ticket) return;
  const msgs = await supa('ticket_messages',`?ticket_id=eq.${id}&order=created_at.asc&select=*`);
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  content.innerHTML = `
    <div class="detail-title">#${ticket.ticket_number} — ${ticket.title}</div>
    <div class="detail-meta">
      <span class="badge b-${ticket.status}">${ticket.status.replace('_',' ')}</span>
      <span class="badge" style="background:var(--border);color:var(--muted)">${ticket.priority}</span>
      <span class="badge" style="background:var(--border);color:var(--muted)">${ticket.category}</span>
      ${ticket.sla_breached?'<span class="badge" style="background:#ef444420;color:var(--red)">SLA BREACH</span>':''}
    </div>
    <div style="font-size:.875rem;color:#cbd5e1;line-height:1.6;margin-bottom:1.5rem">${ticket.description||'No description'}</div>
    <div style="font-size:.75rem;color:var(--muted)">Created: ${ticket.created_at?.substring(0,16)} · Due: ${ticket.due_at?.substring(0,16)||'N/A'}</div>
    <div class="msg-thread">
      <div style="font-size:.8rem;font-weight:600;margin-bottom:.75rem;color:var(--muted)">THREAD (${msgs.length})</div>
      ${msgs.map(m=>`<div class="msg ${m.author_type}">
        <div class="msg-author">${m.author_name} · ${m.created_at?.substring(0,16)}</div>
        <div>${m.body}</div>
      </div>`).join('')}
    </div>`;
  panel.style.display='block';
}

function closeDetail() { document.getElementById('detail-panel').style.display='none'; }

async function loadClients() {
  const clients = await supa('portal_users','?active=eq.true&select=*&order=created_at.desc');
  const grid = document.getElementById('clients-grid');
  const mrr = clients.reduce((s,c)=>s+parseFloat(c.plan_mrr||0),0);
  document.getElementById('s-clients').textContent = clients.length;
  document.getElementById('s-mrr').textContent = '$'+mrr.toFixed(0);
  if (!clients.length) {grid.innerHTML='<div class="loading">No clients yet. Share portal.html to onboard first client.</div>';return;}
  grid.innerHTML = clients.map(c=>`
    <div class="client-card">
      <div class="client-name">${c.name||c.email}</div>
      <div class="client-meta">${c.email}<br>${c.company||''}</div>
      <div class="client-mrr">${c.plan_mrr>0?'$'+parseFloat(c.plan_mrr).toFixed(0)+'/mo':c.plan||'starter'}</div>
      <div style="font-size:.7rem;color:var(--muted);margin-top:.35rem">${c.onboarded?'✅ Onboarded':'⏳ Pending'}</div>
    </div>`).join('');
}

function filterTickets(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let filtered = allTickets;
  if (filter==='sla_breach') filtered = allTickets.filter(t=>t.sla_breached);
  else if (filter==='critical') filtered = allTickets.filter(t=>t.priority==='critical');
  else if (filter!=='all') filtered = allTickets.filter(t=>t.status===filter);
  renderTickets(filtered);
}

async function refreshData() {
  const tickets = await supa('tickets','?select=*&order=created_at.desc&limit=100');
  allTickets = tickets;
  document.getElementById('s-total').textContent = tickets.length;
  document.getElementById('s-open').textContent = tickets.filter(t=>['open','in_progress'].includes(t.status)).length;
  document.getElementById('s-breach').textContent = tickets.filter(t=>t.sla_breached).length;
  renderTickets(tickets);
  await loadClients();
}

refreshData();
setInterval(refreshData, 30000);
</script>
</body>
</html>
