<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>S.C. Thomas — Founder & Editor-in-Chief | NY Spotlight Report</title>
<meta name="description" content="S.C. Thomas is a published author, entertainment journalist, military veteran, and serial entrepreneur. Founder of NY Spotlight Report (Est. 2020).">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#faf9f6;--paper:#fff;--ink:#0f0f0f;--g700:#3d3d3d;--g500:#6b6b6b;--g300:#a3a3a3;--g100:#e5e5e5;--accent:#9e7c0c;--serif:'Playfair Display',serif;--body:'Source Serif 4',serif;--sans:'DM Sans',sans-serif}body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:17px;line-height:1.72}a{color:inherit;text-decoration:none}img{max-width:100%;display:block}
nav{background:var(--paper);border-bottom:1px solid var(--g100);padding:0 clamp(16px,4vw,48px);height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92)}.nl{font-family:var(--serif);font-size:18px;font-weight:700}.nl span{color:var(--accent)}.nr{display:flex;gap:20px;align-items:center}.nr a{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--g500);letter-spacing:.06em;text-transform:uppercase}.nr .sub{background:var(--accent);color:#fff;padding:7px 18px;border-radius:3px;font-size:11px}
.hero-bio{max-width:920px;margin:0 auto;padding:60px clamp(16px,4vw,48px) 40px;display:grid;grid-template-columns:300px 1fr;gap:40px;align-items:start}
.headshot{width:300px;border-radius:6px;box-shadow:0 8px 30px rgba(0,0,0,.12)}.press-badge{width:160px;position:absolute;bottom:-20px;right:-20px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);border:3px solid var(--paper)}.photo-stack{position:relative}
.bio-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}.badge{font-family:var(--sans);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:3px;background:#f5f5f4;border:1px solid var(--g100);color:var(--g700)}.badge-accent{background:rgba(158,124,12,.08);border-color:rgba(158,124,12,.2);color:var(--accent)}
article{max-width:720px;margin:0 auto;padding:0 clamp(16px,4vw,48px) 80px}article h2{font-family:var(--serif);font-size:24px;font-weight:600;margin:36px 0 12px}article p{margin-bottom:16px;color:var(--g700)}
.pullquote{font-family:var(--serif);font-size:22px;font-style:italic;color:var(--ink);line-height:1.45;border-left:3px solid var(--accent);padding:8px 0 8px 24px;margin:32px 0}
.cred-box{background:var(--paper);border:1px solid var(--g100);border-radius:5px;padding:28px;margin:32px 0}.cred-box h3{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cred-item{font-family:var(--sans);font-size:13.5px;color:var(--g700);padding:8px 0;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:8px}.cred-item::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.contact-bar{background:var(--ink);color:rgba(255,255,255,.6);padding:32px;border-radius:5px;margin:32px 0;text-align:center}.contact-bar h3{font-family:var(--serif);font-size:20px;color:#fff;margin-bottom:8px}.contact-bar a{display:inline-block;padding:10px 28px;background:var(--accent);color:#fff;border-radius:3px;font-family:var(--sans);font-size:13px;font-weight:600;margin:6px}
@media(max-width:768px){.hero-bio{grid-template-columns:1fr;text-align:center}.headshot{width:220px;margin:0 auto}.press-badge{position:static;width:140px;margin:12px auto 0}.bio-badges{justify-content:center}.cred-grid{grid-template-columns:1fr}}
</style></head><body>
